<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimlik Kartı - Profil</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        /* PANEL DÜZENLEME */
        .edit-panel {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #444;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .edit-panel h2 {
            margin-bottom: 25px;
            font-size: 24px;
            text-align: center;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #00d4ff;
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #00ff88;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            border-color: #00ffff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            padding: 12px;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        button.reset {
            background: linear-gradient(135deg, #ff4444, #ff6666);
            color: white;
        }

        /* KARİYER BÖLÜMÜ */
        .card-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #444;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .profile-header h1 {
            font-size: 32px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile-header p {
            color: #00d4ff;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .bio-section {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 255, 136, 0.05);
            border-left: 3px solid #00ff88;
            border-radius: 8px;
            text-align: left;
        }

        .bio-section h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .bio-section p {
            color: #ccc;
            line-height: 1.6;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .social-links a {
            display: block;
            padding: 12px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            word-break: break-all;
            font-size: 13px;
        }

        .social-links a:hover {
            background: #00ff88;
            color: #000;
        }

        /* QR KOD */
        .qr-container {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #444;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .qr-container h3 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 18px;
        }

        #qrcodeContainer {
            display: flex;
            justify-content: center;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            min-height: 200px;
            align-items: center;
        }

        /* 3D CANVAS */
        .canvas-container {
            position: relative;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #444;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            height: 400px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- DÜZENLEME PANELI -->
        <div class="edit-panel">
            <h2>👤 Profil Bilgileri</h2>
            
            <div class="form-group">
                <label>İsim</label>
                <input type="text" id="firstName" placeholder="Adınız" value="Melih">
            </div>

            <div class="form-group">
                <label>Soyadı</label>
                <input type="text" id="lastName" placeholder="Soyadınız" value="Takyacı">
            </div>

            <div class="form-group">
                <label>Ünvan/Meslek</label>
                <input type="text" id="title" placeholder="Ex: Web Developer" value="Web Developer">
            </div>

            <div class="form-group">
                <label>Biyografi</label>
                <textarea id="bio" placeholder="Kendiniz hakkında kısa bilgi...">Merhaba! Ben Melih Takyacı, web geliştirme ve tasarım alanında çalışıyorum.</textarea>
            </div>

            <div class="form-group">
                <label>📷 Instagram Linki</label>
                <input type="url" id="instagram" placeholder="https://instagram.com/..." value="https://instagram.com/melih.takyaci">
            </div>

            <div class="form-group">
                <label>📷 Instagram Linki 2</label>
                <input type="url" id="instagram2" placeholder="https://instagram.com/..." value="">
            </div>

            <div class="form-group">
                <label>📍 Google Maps Linki</label>
                <input type="url" id="maps" placeholder="https://maps.google.com/..." value="">
            </div>

            <div class="form-group">
                <label>🔗 Diğer Link</label>
                <input type="url" id="website" placeholder="https://..." value="">
            </div>

            <div class="button-group">
                <button onclick="updateProfile()">💾 Güncelle</button>
                <button class="reset" onclick="resetProfile()">🔄 Sıfırla</button>
            </div>
        </div>

        <!-- KARİYER BÖLÜMÜ -->
        <div class="card-section">
            <!-- PROFIL KARTI -->
            <div class="profile-card">
                <div class="profile-header">
                    <h1 id="displayName">Melih Takyacı</h1>
                    <p id="displayTitle">Web Developer</p>
                </div>

                <div class="bio-section">
                    <h3>Hakkımda</h3>
                    <p id="displayBio">Merhaba! Ben Melih Takyacı, web geliştirme ve tasarım alanında çalışıyorum.</p>
                </div>

                <div class="social-links" id="socialLinks">
                    <a href="https://instagram.com/melih.takyaci" target="_blank" id="instLink">📷 Instagram</a>
                </div>
            </div>

            <!-- QR KOD -->
            <div class="qr-container">
                <h3>📱 QR Kod</h3>
                <div id="qrcodeContainer"></div>
            </div>
        </div>
    </div>

    <!-- 3D DÜNYA VE AY -->
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        // PROFIL GÜNCELLEME
        function updateProfile() {
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const title = document.getElementById('title').value;
            const bio = document.getElementById('bio').value;
            const instagram = document.getElementById('instagram').value;
            const instagram2 = document.getElementById('instagram2').value;
            const maps = document.getElementById('maps').value;
            const website = document.getElementById('website').value;

            // Display güncelleme
            document.getElementById('displayName').textContent = `${firstName} ${lastName}`;
            document.getElementById('displayTitle').textContent = title;
            document.getElementById('displayBio').textContent = bio;

            // Social links
            const socialLinksDiv = document.getElementById('socialLinks');
            socialLinksDiv.innerHTML = '';

            if (instagram) {
                socialLinksDiv.innerHTML += `<a href="${instagram}" target="_blank">📷 Instagram 1</a>`;
            }
            if (instagram2) {
                socialLinksDiv.innerHTML += `<a href="${instagram2}" target="_blank">📷 Instagram 2</a>`;
            }
            if (maps) {
                socialLinksDiv.innerHTML += `<a href="${maps}" target="_blank">📍 Google Maps</a>`;
            }
            if (website) {
                socialLinksDiv.innerHTML += `<a href="${website}" target="_blank">🌐 Website</a>`;
            }

            // QR Kod Oluştur
            generateQRCode(instagram, maps, website);

            alert('✅ Profil güncellendi!');
        }

        function resetProfile() {
            document.getElementById('firstName').value = 'Melih';
            document.getElementById('lastName').value = 'Takyacı';
            document.getElementById('title').value = 'Web Developer';
            document.getElementById('bio').value = 'Merhaba! Ben Melih Takyacı, web geliştirme ve tasarım alanında çalışıyorum.';
            document.getElementById('instagram').value = 'https://instagram.com/melih.takyaci';
            document.getElementById('instagram2').value = '';
            document.getElementById('maps').value = '';
            document.getElementById('website').value = '';
            updateProfile();
        }

        function generateQRCode(instagram, maps, website) {
            const container = document.getElementById('qrcodeContainer');
            container.innerHTML = '';

            let qrText = '';
            if (instagram) qrText += instagram + '\n';
            if (maps) qrText += maps + '\n';
            if (website) qrText += website;

            if (qrText.trim()) {
                new QRCode(container, {
                    text: qrText,
                    width: 180,
                    height: 180,
                    colorDark: '#000',
                    colorLight: '#fff',
                    correctLevel: QRCode.CorrectLevel.H
                });
            }
        }

        // 3D ANIMASYON
        let scene, camera, renderer;
        let earth, moon;

        function init3D() {
            const canvas = document.getElementById('canvas');
            const width = canvas.parentElement.clientWidth;
            const height = canvas.parentElement.clientHeight;

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // Camera
            camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
            camera.position.z = 3;

            // Renderer
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);

            // DÜNYA - Mavi ve yeşil
            const earthGeometry = new THREE.SphereGeometry(0.8, 64, 64);
            const earthMaterial = new THREE.MeshPhongMaterial({
                color: 0x2e7d32,
                emissive: 0x1a3d1a,
                shininess: 5
            });
            earth = new THREE.Mesh(earthGeometry, earthMaterial);
            earth.position.x = -1;
            scene.add(earth);

            // Dünya detayları
            const earthWireframe = new THREE.WireframeGeometry(earthGeometry);
            const line = new THREE.LineSegments(earthWireframe, new THREE.LineBasicMaterial({ color: 0x00ff88, linewidth: 0.1 }));
            line.position.copy(earth.position);
            scene.add(line);

            // AY - Gri
            const moonGeometry = new THREE.SphereGeometry(0.3, 32, 32);
            const moonMaterial = new THREE.MeshPhongMaterial({
                color: 0xaaaaaa,
                emissive: 0x555555,
                shininess: 3
            });
            moon = new THREE.Mesh(moonGeometry, moonMaterial);
            moon.position.x = 1.5;
            scene.add(moon);

            // Ay detayları
            const moonWireframe = new THREE.WireframeGeometry(moonGeometry);
            const moonLine = new THREE.LineSegments(moonWireframe, new THREE.LineBasicMaterial({ color: 0x00d4ff, linewidth: 0.1 }));
            moonLine.position.copy(moon.position);
            scene.add(moonLine);

            // Işık
            const light = new THREE.PointLight(0xffffff, 1.5);
            light.position.set(5, 3, 5);
            scene.add(light);

            const ambientLight = new THREE.AmbientLight(0x00ff88, 0.3);
            scene.add(ambientLight);

            // Animate
            animate();

            // Window Resize
            window.addEventListener('resize', onWindowResize);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Dünya dönüşü
            earth.rotation.y += 0.002;
            scene.getObjectByProperty('isLine', true)?.forEach(obj => {
                if (obj.position.x === earth.position.x) obj.rotation.copy(earth.rotation);
            });

            // Ay dönüşü
            moon.rotation.y += 0.01;

            // Ay Dünya etrafında dönüşü
            const time = Date.now() * 0.0005;
            moon.position.x = Math.cos(time) * 1.5;
            moon.position.z = Math.sin(time) * 0.5;

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const canvas = document.getElementById('canvas');
            const width = canvas.parentElement.clientWidth;
            const height = canvas.parentElement.clientHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        // YÜKLEMESİ
        window.addEventListener('load', () => {
            init3D();
            generateQRCode('https://instagram.com/melih.takyaci', '', '');
        });
    </script>
</body>
</html>
