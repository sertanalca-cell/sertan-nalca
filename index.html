<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universe Profile</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* SPACE BACKGROUND */
#space{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://upload.wikimedia.org/wikipedia/commons/3/3f/Milky_Way_IR_Spitzer.jpg");
  background-size:cover;
  background-position:center;
  opacity:0.5;
  z-index:-2;
}

/* STAR FIELD */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.8;
}

/* PROFILE */
#profile{
  position:absolute;
  top:20px;
  left:20px;
  z-index:10;
}

#profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:2px solid white;
  object-fit:cover;
  cursor:pointer;
}

/* CENTER INFO */
#center{
  position:absolute;
  bottom:120px;
  width:100%;
  text-align:center;
}

.card{
  display:inline-block;
  padding:10px 18px;
  margin:5px;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

/* ADMIN */
#admin{
  display:none;
  position:absolute;
  top:20px;
  right:20px;
  background:rgba(0,0,0,0.75);
  padding:10px;
  border-radius:10px;
}
input{width:160px;margin:5px;}
</style>
</head>

<body>

<div id="space"></div>

<div id="profile">
  <img id="pfp" onclick="openAdmin()">
</div>

<div id="center">
  <div class="card">Sertan Nalça</div><br>
  <div class="card">+355692033673</div>
</div>

<div id="admin">
  <input id="pass" placeholder="Password"><br>
  <input id="img" placeholder="Photo URL"><br>
  <button onclick="save()">Save</button>
</div>

<canvas id="bg"></canvas>

<script>

/* ===== MOVING STARS (diagonal drift) ===== */
for(let i=0;i<250;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);

  moveStar(s);
}

function moveStar(el){
  let x = 0.3 + Math.random()*0.6;
  let y = 0.2 + Math.random()*0.5;

  function animate(){
    let rect = el.getBoundingClientRect();

    el.style.left = rect.left + x + "px";
    el.style.top = rect.top + y + "px";

    if(rect.left > window.innerWidth) el.style.left = "0px";
    if(rect.top > window.innerHeight) el.style.top = "0px";

    requestAnimationFrame(animate);
  }
  animate();
}

/* ===== THREE JS UNIVERSE ===== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);
camera.position.z = 3;

/* 🌍 EARTH */
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1,64,64),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg")
  })
);
scene.add(earth);

/* 🌙 MOON */
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.27,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/moon_1024.jpg")
  })
);
scene.add(moon);

/* ✨ UNIVERSAL DRIFT (whole scene moves slightly) */
let t = 0;

/* ANIMATE */
function animate(){
  requestAnimationFrame(animate);

  t += 0.001;

  /* Earth rotation */
  earth.rotation.y += 0.002;

  /* Moon orbit */
  moon.position.x = Math.sin(Date.now()*0.001)*2;
  moon.position.z = Math.cos(Date.now()*0.001)*2;

  /* Universe drift effect */
  camera.position.x = Math.sin(t)*0.1;
  camera.position.y = Math.cos(t)*0.1;

  renderer.render(scene,camera);
}
animate();

/* ===== PROFILE SYSTEM ===== */
function openAdmin(){
  let pass = prompt("Password:");
  if(pass === "Sertan2906"){
    document.getElementById("admin").style.display="block";
  }
}

function save(){
  localStorage.setItem("pfp",img.value);
  load();
}

function load(){
  pfp.src = localStorage.getItem("pfp") || "https://i.imgur.com/8Km9tLL.png";
}
load();

</script>

</body>
</html>
