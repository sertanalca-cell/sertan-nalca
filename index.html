<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertan Nalça - AI Developer & Creator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: fall 8s linear infinite;
        }

        @keyframes fall {
            to {
                transform: translate(100vw, 100vh);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            font-size: 3.5em;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #b0b0b0;
            margin-bottom: 30px;
        }

        #earth {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #4da6ff, #00cc99, #003d33);
            box-shadow: 0 0 60px rgba(76, 175, 80, 0.5), 0 0 100px rgba(0, 204, 153, 0.3);
            margin: 40px 0;
            animation: earthRotate 20s linear infinite;
            position: relative;
        }

        @keyframes earthRotate {
            0% {
                transform: rotateY(0deg) rotateX(20deg);
            }
            100% {
                transform: rotateY(360deg) rotateX(20deg);
            }
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            padding: 12px 24px;
            border: 2px solid #444;
            background: rgba(20, 20, 20, 0.8);
            color: white;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 40px;
        }

        .btn:hover {
            border-color: #00cc99;
            background: rgba(0, 204, 153, 0.1);
            box-shadow: 0 0 20px rgba(0, 204, 153, 0.3);
        }

        .btn-icon {
            font-size: 1.2em;
        }

        .instagram-icon {
            width: 20px;
            height: 20px;
        }

        .whatsapp-icon {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div id="stars-container"></div>
    
    <div class="container">
        <h1>Sertan Nalça</h1>
        <p class="subtitle">AI Developer & Creator</p>
        
        <div id="earth"></div>
        
        <div class="buttons-container">
            <a href="https://instagram.com/sertanalca" target="_blank" class="btn">
                <span class="btn-icon">📷</span>
                <span>Instagram</span>
            </a>
            <a href="https://wa.me/355692033673" target="_blank" class="btn">
                <span class="btn-icon">💬</span>
                <span>WhatsApp +355692033673</span>
            </a>
        </div>
    </div>

    <script>
        const starsContainer = document.getElementById('stars-container');
        
        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            
            // Random starting position from top-left
            const startX = Math.random() * window.innerWidth * 0.5;
            const startY = Math.random() * window.innerHeight * 0.5;
            
            star.style.left = startX + 'px';
            star.style.top = startY + 'px';
            star.style.opacity = Math.random() * 0.7 + 0.3;
            star.style.width = (Math.random() * 2 + 1) + 'px';
            star.style.height = star.style.width;
            
            const duration = Math.random() * 6 + 4;
            star.style.animationDuration = duration + 's';
            star.style.animationDelay = Math.random() * 5 + 's';
            
            starsContainer.appendChild(star);
            
            setTimeout(() => {
                star.remove();
            }, (duration + 5) * 1000);
        }
        
        // Create stars continuously
        setInterval(createStar, 200);
        
        // Create initial stars
        for (let i = 0; i < 30; i++) {
            setTimeout(createStar, i * 100);
        }
    </script>
</body>
</html>
