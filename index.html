<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertan Nalça • Digital Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #000000;
        }

        /* Derin uzay + hareketli yıldızlar */
        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: transparent;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px white;
            animation: twinkle 3.5s infinite alternate, drift 90s linear infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(140px, 90px); } /* sol üstten sağ alta yavaş hareket */
        }

        .content {
            position: relative;
            z-index: 10;
        }

        .name {
            font-family: 'Playfair Display', serif;
        }

        .globe-container {
            width: 210px;
            height: 210px;
            position: relative;
            margin: 0 auto 35px;
            z-index: 2;
        }

        .globe {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: radial-gradient(circle at 36% 28%, #a5f3fc, #22d3ee 25%, #4ade80 45%, #15803d 70%, #052e16);
            box-shadow: 
                0 0 85px rgba(165, 243, 252, 0.8),
                inset 38px 32px 55px rgba(255,255,255,0.35),
                inset -40px -40px 75px rgba(0,0,0,0.9);
            animation: rotateGlobe 45s linear infinite;
            border: 3px solid rgba(255,255,255,0.25);
        }

        @keyframes rotateGlobe {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .moon {
            position: absolute;
            width: 36px;
            height: 36px;
            background: #e2e8f0;
            border-radius: 50%;
            box-shadow: 0 0 20px #cbd5e1, inset 10px 8px 15px rgba(0,0,0,0.7);
            top: 25px;
            right: -25px;
            animation: moonOrbit 38s linear infinite;
            z-index: 3;
        }

        @keyframes moonOrbit {
            from { transform: rotate(0deg) translateX(105px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(105px) rotate(-360deg); }
        }

        .link-btn {
            font-size: 15px;
            padding: 12px 20px;
            transition: all 0.4s ease;
        }
        
        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.7);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-8 px-4 text-white relative">

    <!-- Hareketli Yıldızlar -->
    <div class="stars" id="starsContainer"></div>

    <div class="content max-w-md w-full text-center">
        
        <!-- İsim (daha yukarı ve biraz küçük) -->
        <h1 class="name text-3xl font-bold tracking-tighter mb-1 drop-shadow-2xl">
            Sertan Nalça
        </h1>
        <p class="text-purple-300 text-base mb-10">AI Developer & Creator</p>

        <!-- Gerçekçi Dönen Dünya + Ay -->
        <div class="globe-container">
            <div class="globe"></div>
            <div class="moon"></div>
        </div>

        <!-- Butonlar (daha küçük) -->
        <div class="space-y-3 px-6">
            <a href="https://instagram.com/sertanalca" target="_blank" 
               class="link-btn block bg-white/10 hover:bg-white/20 border border-white/30 font-medium rounded-3xl flex items-center justify-center gap-3 backdrop-blur-md">
                <i class="fab fa-instagram text-2xl"></i>
                <span>Instagram</span>
            </a>
            
            <a href="https://wa.me/355692033673" target="_blank" 
               class="link-btn block bg-white/10 hover:bg-white/20 border border-white/30 font-medium rounded-3xl flex items-center justify-center gap-3 backdrop-blur-md">
                <i class="fab fa-whatsapp text-2xl"></i>
                <span>WhatsApp</span>
            </a>
        </div>

        <p class="text-white/40 text-xs mt-14">Sertan Nalça • Digital Identity</p>
    </div>

    <script>
        // Yoğun hareketli yıldızlar
        function createStars() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 220; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                const size = Math.random() * 2.5 + 0.8;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                
                star.style.animationDuration = `${Math.random() * 4 + 3}s`;
                star.style.animationDelay = `-${Math.random() * 6}s`;
                
                container.appendChild(star);
            }
        }
        createStars();
    </script>
</body>
</html>
