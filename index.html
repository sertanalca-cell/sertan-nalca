<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sertan Universe</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
}

/* PROFILE */
#profile{
  position:absolute;
  top:20px;
  left:20px;
  z-index:10;
}

#pfp{
  width:90px;
  height:90px;
  border-radius:50%;
  border:2px solid white;
  object-fit:cover;
  cursor:pointer;
}

/* CENTER INFO */
#info{
  position:absolute;
  bottom:120px;
  width:100%;
  text-align:center;
}

.box{
  display:inline-block;
  padding:10px 18px;
  margin:5px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

/* ADMIN */
#admin{
  display:none;
  position:absolute;
  top:20px;
  right:20px;
  background:rgba(0,0,0,0.8);
  padding:10px;
  border-radius:10px;
}
input{width:160px;margin:5px;}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="profile">
  <img id="pfp" onclick="openAdmin()">
</div>

<div id="info">
  <div class="box">Sertan Nalça</div><br>
  <div class="box">+355692033673</div>
</div>

<div id="admin">
  <input type="file" id="file"><br>
  <input id="pass" placeholder="Password"><br>
  <button onclick="save()">Save</button>
</div>

<script>

/* ===== STAR SYSTEM (diagonal motion) ===== */
for(let i=0;i<250;i++){
  let s=document.createElement("div");
  s.style.position="absolute";
  s.style.width="2px";
  s.style.height="2px";
  s.style.background="white";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);

  let x = 0.3 + Math.random()*0.6;
  let y = 0.2 + Math.random()*0.5;

  function move(){
    let r = s.getBoundingClientRect();
    s.style.left = r.left + x + "px";
    s.style.top = r.top + y + "px";

    if(r.left > innerWidth) s.style.left="0px";
    if(r.top > innerHeight) s.style.top="0px";

    requestAnimationFrame(move);
  }
  move();
}

/* ===== THREE JS UNIVERSE ===== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);
camera.position.z=3;

/* 🌌 REAL GALAXY SPHERE (FIXED) */
const galaxy = new THREE.Mesh(
  new THREE.SphereGeometry(50,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://upload.wikimedia.org/wikipedia/commons/3/3f/Milky_Way_IR_Spitzer.jpg"),
    side:THREE.BackSide
  })
);
scene.add(galaxy);

/* 🌍 EARTH (BIG + CLEAR) */
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1.2,64,64),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg")
  })
);
scene.add(earth);

/* 🌙 MOON (VISIBLE BIGGER) */
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.35,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/moon_1024.jpg")
  })
);
scene.add(moon);

/* ANIMATE */
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;

  moon.position.x = Math.sin(Date.now()*0.001)*2.2;
  moon.position.z = Math.cos(Date.now()*0.001)*2.2;

  renderer.render(scene,camera);
}
animate();

/* ===== PHOTO UPLOAD (NO URL) ===== */
document.getElementById("file").onchange = function(e){
  let reader = new FileReader();
  reader.onload = function(){
    localStorage.setItem("pfp",reader.result);
    load();
  }
  reader.readAsDataURL(e.target.files[0]);
};

/* ADMIN */
function openAdmin(){
  let p = prompt("Password:");
  if(p==="Sertan2906"){
    admin.style.display="block";
  }
}

/* SAVE LOAD */
function save(){
  alert("Photo saved!");
  load();
}

function load(){
  pfp.src = localStorage.getItem("pfp") || "https://i.imgur.com/8Km9tLL.png";
}
load();

</script>

</body>
</html>
