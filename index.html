<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sertan Nalça</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      background: #000000;
      color: white;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Yıldızlar + hareket efekti */
    .stars {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: transparent;
      box-shadow: 
        80px 120px 1px #fff,
        200px 50px 1px #fff,
        350px 180px 1px #fff,
        480px 80px 1px #fff,
        650px 220px 1px #fff,
        820px 140px 1px #fff,
        950px 300px 1px #fff,
        1100px 90px 1px #fff,
        120px 350px 1px #fff,
        700px 380px 1px #fff;
      opacity: 0.75;
      animation: starsMove 120s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes starsMove {
      from { transform: translate(0, 0); }
      to   { transform: translate(-80px, 60px); } /* Üst-sağdan sola-alta doğru yavaş hareket */
    }

    .twinkle {
      animation: twinkle 4s infinite alternate ease-in-out;
    }

    @keyframes twinkle {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    h1 {
      font-size: 3.7rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(180, 220, 255, 0.9);
    }

    .subtitle {
      font-size: 1.45rem;
      color: #b0c8ff;
      margin-bottom: 70px;
      letter-spacing: 2px;
    }

    /* Dönmekte olan gerçekçi Dünya */
    .earth-container {
      width: 290px;
      height: 290px;
      margin: 0 auto 80px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 
        0 0 80px rgba(0, 255, 140, 0.7),
        0 0 150px rgba(100, 200, 255, 0.5);
      z-index: 2;
    }

    .earth {
      width: 100%;
      height: 100%;
      background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/The_Blue_Marble_%28remastered%29.jpg/1024px-The_Blue_Marble_%28remastered%29.jpg') center/cover;
      border-radius: 50%;
      animation: rotateEarth 45s linear infinite;
      box-shadow: inset 0 0 60px rgba(0, 255, 120, 0.4);
    }

    @keyframes rotateEarth {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 340px;
      z-index: 2;
    }

    .btn {
      padding: 17px 28px;
      border-radius: 50px;
      font-size: 1.15rem;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: all 0.3s ease;
    }

    .btn-instagram {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1.5px solid rgba(255,255,255,0.4);
    }

    .btn-instagram:hover {
      background: rgba(255,255,255,0.22);
      transform: translateY(-3px);
    }

    .btn-whatsapp {
      background: #25D366;
      color: white;
    }

    .btn-whatsapp:hover {
      background: #20c35e;
      transform: translateY(-3px);
    }

    .icon {
      width: 26px;
      height: 26px;
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <div class="content">
    <h1>Sertan Nalça</h1>
    <p class="subtitle">AI Developer & Creator</p>

    <div class="earth-container">
      <div class="earth"></div>
    </div>

    <div class="buttons">
      <a href="https://www.instagram.com/sertanalca" target="_blank" class="btn btn-instagram">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram" class="icon">
        Instagram
      </a>
      
      <a href="https://wa.me/355692033673" target="_blank" class="btn btn-whatsapp">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="icon">
        WhatsApp
      </a>
    </div>
  </div>

</body>
</html>
