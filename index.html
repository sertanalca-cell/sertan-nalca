<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Profil</title>

<!-- ICON -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: Arial;
  background:black;
  color:white;
}

/* YILDIZ */
#stars {
  position:fixed;
  width:100%;
  height:200%;
}

.star {
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  animation:fall linear infinite;
}

@keyframes fall {
  from {transform:translateY(-100vh);}
  to {transform:translateY(100vh);}
}

/* UI */
.panel {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:20px;
  text-align:center;
}

/* INPUT */
input, textarea {
  width:250px;
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* BUTTON */
button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:gold;
  cursor:pointer;
}

/* PROFILE IMG */
#preview {
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  margin:10px;
}

/* SOCIAL */
.social a {
  color:white;
  margin:10px;
  font-size:24px;
}

.footer {
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
}
</style>
</head>

<body>

<div id="stars"></div>

<!-- 3D -->
<canvas id="bg"></canvas>

<div class="panel">

  <input type="file" id="photo">
  <br>
  <img id="preview">

  <br>
  <input id="name" placeholder="Ad Soyad">
  <br>
  <textarea id="bio" placeholder="Biyografi"></textarea>
  <br>

  <input id="instaInput" placeholder="Instagram link">
  <input id="tiktokInput" placeholder="TikTok link">

  <br>
  <button onclick="save()">Kaydet</button>

  <h2 id="displayName"></h2>
  <p id="displayBio"></p>

  <div class="social">
    <a id="insta" target="_blank"><i class="fab fa-instagram"></i></a>
    <a id="tiktok" target="_blank"><i class="fab fa-tiktok"></i></a>
  </div>

</div>

<div class="footer">Sertan Nalça</div>

<script>

/* YILDIZ */
for(let i=0;i<200;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*5+5)+"s";
  document.getElementById("stars").appendChild(s);
}

/* THREE JS */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"), alpha:true});

renderer.setSize(innerWidth, innerHeight);
camera.position.z = 3;

/* EARTH */
const geometry = new THREE.SphereGeometry(1, 32, 32);
const texture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/earth_atmos_2048.jpg');
const material = new THREE.MeshBasicMaterial({map:texture});
const earth = new THREE.Mesh(geometry, material);
scene.add(earth);

/* MOON */
const moonGeo = new THREE.SphereGeometry(0.27, 32, 32);
const moonTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/moon_1024.jpg');
const moonMat = new THREE.MeshBasicMaterial({map:moonTex});
const moon = new THREE.Mesh(moonGeo, moonMat);
scene.add(moon);

function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;

  moon.position.x = Math.sin(Date.now()*0.001)*2;
  moon.position.z = Math.cos(Date.now()*0.001)*2;

  renderer.render(scene, camera);
}
animate();

/* PHOTO */
document.getElementById("photo").onchange = e=>{
  let file = e.target.files[0];
  let reader = new FileReader();
  reader.onload = function(){
    localStorage.setItem("photo", reader.result);
    load();
  }
  reader.readAsDataURL(file);
}

/* SAVE */
function save(){
  localStorage.setItem("name", name.value);
  localStorage.setItem("bio", bio.value);
  localStorage.setItem("insta", instaInput.value);
  localStorage.setItem("tiktok", tiktokInput.value);
  load();
}

/* LOAD */
function load(){
  displayName.innerText = localStorage.getItem("name") || "";
  displayBio.innerText = localStorage.getItem("bio") || "";
  preview.src = localStorage.getItem("photo") || "";

  insta.href = localStorage.getItem("insta") || "#";
  tiktok.href = localStorage.getItem("tiktok") || "#";
}

load();

</script>

</body>
</html>
