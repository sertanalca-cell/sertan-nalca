<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Profile</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
}

/* STAR FALL FULL SCREEN */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.8;
  animation:move linear infinite;
}

@keyframes move{
  from {transform:translateY(-100vh) translateX(0);}
  to {transform:translateY(100vh) translateX(200px);}
}

/* LEFT PROFILE */
#profileBox{
  position:absolute;
  top:20px;
  left:20px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:15px;
  width:120px;
  text-align:center;
}

#profileBox img{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  cursor:pointer;
}

/* CENTER TEXT */
#info{
  position:absolute;
  bottom:120px;
  width:100%;
  text-align:center;
}

.glass{
  display:inline-block;
  padding:10px 20px;
  margin:5px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
}

/* NAME COLORS */
#name span:nth-child(odd){color:#00aaff;}
#name span:nth-child(even){color:#00ff88;}

/* ADMIN PANEL */
#admin{
  display:none;
  position:absolute;
  top:20px;
  right:20px;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
}
input{
  width:140px;
  margin:5px;
}
button{
  width:150px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="profileBox">
  <img id="pfp" src="" onclick="openAdmin()">
  <small>Profil</small>
</div>

<div id="info">
  <div class="glass" id="name"></div><br>
  <div class="glass">Contact Nr: 00355692033673</div>
</div>

<!-- ADMIN -->
<div id="admin">
  <input id="pass" placeholder="Şifre"><br>
  <input id="img" placeholder="Foto URL"><br>
  <button onclick="save()">Kaydet</button>
</div>

<script>

/* STAR FIELD FULL SCREEN */
for(let i=0;i<250;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  s.style.animationDuration=(Math.random()*10+5)+"s";
  document.body.appendChild(s);
}

/* NAME */
let fullName = "Sertan Nalça";
let nameBox = document.getElementById("name");

nameBox.innerHTML = fullName.split("").map(l=>{
  return `<span>${l}</span>`;
}).join("");

/* THREE JS SPACE */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);
camera.position.z=4;

/* EARTH */
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg")
  })
);
scene.add(earth);

/* MOON */
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.3,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/moon_1024.jpg")
  })
);
scene.add(moon);

/* SATELLITES */
let sats=[];
for(let i=0;i<5;i++){
  let sat=new THREE.Mesh(
    new THREE.BoxGeometry(0.05,0.05,0.05),
    new THREE.MeshBasicMaterial({color:0xaaaaaa})
  );
  scene.add(sat);
  sats.push({mesh:sat,angle:Math.random()*Math.PI*2,speed:0.01+Math.random()*0.01});
}

/* MILKY WAY BACKGROUND */
const galaxy = new THREE.Mesh(
  new THREE.SphereGeometry(20,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://upload.wikimedia.org/wikipedia/commons/3/3f/Milky_Way_IR_Spitzer.jpg"),
    side:THREE.BackSide
  })
);
scene.add(galaxy);

/* ANIMATE */
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;

  moon.position.x = Math.sin(Date.now()*0.001)*2;
  moon.position.z = Math.cos(Date.now()*0.001)*2;

  sats.forEach(s=>{
    s.angle += s.speed;
    s.mesh.position.x = Math.cos(s.angle)*1.5;
    s.mesh.position.z = Math.sin(s.angle)*1.5;
    s.mesh.position.y = Math.sin(s.angle)*0.5;
  });

  renderer.render(scene,camera);
}
animate();

/* ADMIN */
function openAdmin(){
  document.getElementById("admin").style.display="block";
}

function save(){
  if(pass.value === "Sertan2906"){
    localStorage.setItem("pfp",img.value);
    document.getElementById("pfp").src = img.value;
    alert("Kaydedildi");
  }else{
    alert("Hatalı şifre");
  }
}

/* LOAD */
document.getElementById("pfp").src = localStorage.getItem("pfp") || "";

</script>

</body>
</html>
