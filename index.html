<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universe Center</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
}

/* GALAXY */
#space{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://upload.wikimedia.org/wikipedia/commons/3/3f/Milky_Way_IR_Spitzer.jpg");
  background-size:cover;
  opacity:0.35;
  z-index:-2;
}

/* STAR */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.7;
}

/* PROFILE */
#profile{
  position:absolute;
  top:20px;
  left:20px;
}

#profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:2px solid white;
  object-fit:cover;
  cursor:pointer;
}

/* INFO */
#info{
  position:absolute;
  bottom:120px;
  width:100%;
  text-align:center;
}

.box{
  display:inline-block;
  padding:10px 18px;
  margin:5px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

/* ADMIN */
#admin{
  display:none;
  position:absolute;
  top:20px;
  right:20px;
  background:rgba(0,0,0,0.8);
  padding:10px;
  border-radius:10px;
}
input{width:160px;margin:5px;}
</style>
</head>

<body>

<div id="space"></div>

<canvas id="bg"></canvas>

<div id="profile">
  <img id="pfp" onclick="openAdmin()">
</div>

<div id="info">
  <div class="box">Sertan Nalça</div><br>
  <div class="box">+355692033673</div>
</div>

<div id="admin">
  <input type="file" id="file"><br>
  <input id="pass" placeholder="Password"><br>
</div>

<script>

/* STAR FIELD */
for(let i=0;i<200;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);
}

/* THREE JS */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

/* CAMERA closer for BIG objects */
camera.position.z = 2.5;

/* 🌌 GALAXY SPHERE */
const galaxy = new THREE.Mesh(
  new THREE.SphereGeometry(60,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://upload.wikimedia.org/wikipedia/commons/3/3f/Milky_Way_IR_Spitzer.jpg"),
    side:THREE.BackSide
  })
);
scene.add(galaxy);

/* 🌍 EARTH BIG CENTER */
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1.8,64,64),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg")
  })
);
scene.add(earth);

/* 🌙 MOON BIG + CLEAR */
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.6,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/moon_1024.jpg")
  })
);
scene.add(moon);

/* ANIMATION */
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;

  /* BIG ORBIT AROUND EARTH */
  moon.position.x = Math.sin(Date.now()*0.001)*3;
  moon.position.z = Math.cos(Date.now()*0.001)*3;

  renderer.render(scene,camera);
}
animate();

/* PROFILE UPLOAD */
document.getElementById("file").onchange = function(e){
  let r = new FileReader();
  r.onload = function(){
    localStorage.setItem("pfp",r.result);
    load();
  }
  r.readAsDataURL(e.target.files[0]);
};

/* ADMIN */
function openAdmin(){
  let p = prompt("Password:");
  if(p==="Sertan2906"){
    admin.style.display="block";
  }
}

/* LOAD */
function load(){
  pfp.src = localStorage.getItem("pfp") || "https://i.imgur.com/8Km9tLL.png";
}
load();

</script>

</body>
</html>
