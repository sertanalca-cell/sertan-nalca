<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sertan Nalça</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    canvas { display: block; }
    
    .overlay {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: white;
      z-index: 10;
      pointer-events: none;
    }
    h1 {
      font-size: 3.5rem;
      margin: 0;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
    }
    p {
      font-size: 1.3rem;
      margin: 10px 0 0;
      color: #a0f0ff;
      text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
    }
  </style>
</head>
<body>

  <div class="overlay">
    <h1>Sertan Nalça</h1>
    <p>AI Developer & Creator</p>
  </div>

  <script>
    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    camera.position.z = 4;

    // Işıklar
    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
    directionalLight.position.set(5, 3, 5);
    scene.add(directionalLight);

    // Gerçekçi Dünya (Earth)
    const earthGeometry = new THREE.SphereGeometry(1.2, 64, 64);
    const earthTexture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    const bumpTexture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
    const specularTexture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');

    const earthMaterial = new THREE.MeshPhongMaterial({
      map: earthTexture,
      bumpMap: bumpTexture,
      bumpScale: 0.05,
      specularMap: specularTexture,
      specular: 0x333333,
      shininess: 5
    });

    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    scene.add(earth);

    // Hafif atmosfer glow efekti
    const atmosphereGeometry = new THREE.SphereGeometry(1.25, 64, 64);
    const atmosphereMaterial = new THREE.MeshPhongMaterial({
      color: 0x00ddff,
      transparent: true,
      opacity: 0.15,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide
    });
    const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
    earth.add(atmosphere);

    // Yıldızlar (Particles) - sol üstten sağ alta yavaşça kayıyor
    const starsCount = 8000;
    const starsGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(starsCount * 3);
    const colors = new Float32Array(starsCount * 3);

    for (let i = 0; i < starsCount * 3; i += 3) {
      // Rastgele pozisyonlar (önceki sahnenin derinliğinde)
      positions[i]     = (Math.random() - 0.5) * 200;   // x
      positions[i + 1] = (Math.random() - 0.5) * 200;   // y
      positions[i + 2] = (Math.random() - 0.5) * 200;   // z

      const brightness = Math.random() * 0.8 + 0.2;
      colors[i]     = brightness;
      colors[i + 1] = brightness;
      colors[i + 2] = brightness;
    }

    starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const starsMaterial = new THREE.PointsMaterial({
      size: 0.15,
      vertexColors: true,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending
    });

    const starField = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(starField);

    // Animasyon döngüsü
    function animate() {
      requestAnimationFrame(animate);

      // Dünya yavaşça dönüyor
      earth.rotation.y += 0.0008;

      // Yıldızlar yavaşça sol üst → sağ alt yönde kayıyor
      starField.position.x += 0.008;   // sağa
      starField.position.y -= 0.008;   // aşağı

      // Yıldızlar ekran dışına çıkınca tekrar başa al (sonsuz döngü)
      if (starField.position.x > 30) starField.position.x = -30;
      if (starField.position.y < -30) starField.position.y = 30;

      renderer.render(scene, camera);
    }

    animate();

    // Pencere yeniden boyutlandırma
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
