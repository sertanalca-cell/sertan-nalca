<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sertan Nalça</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; background: #000; overflow-x: hidden; }
    #page {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 24px 64px;
      z-index: 1;
    }
    canvas.fixed {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(28px, 7.5vw, 42px);
      font-weight: 700;
      color: #e8f4ff;
      text-align: center;
      letter-spacing: 5px;
      line-height: 1.1;
      margin-bottom: 10px;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow:
        0 0 6px rgba(100,180,255,0.95),
        0 0 14px rgba(80,160,255,0.75),
        0 0 30px rgba(60,130,255,0.45),
        0 0 55px rgba(40,100,255,0.20);
    }
    #subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #7da8f8;
      letter-spacing: 0.4px;
      margin-bottom: 20px;
      text-align: center;
    }
    #earth-wrap {
      position: relative;
      width: 500px;
      height: 500px;
      margin-bottom: 32px;
    }
    #sat-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 500px; height: 500px;
      pointer-events: none;
      z-index: 3;
    }
    #earth-img {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      object-fit: cover;
      z-index: 1;
    }
    #buttons {
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: 50px;
      background: rgba(28,28,28,0.92);
      border: 1px solid rgba(255,255,255,0.10);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { background: rgba(50,50,50,0.95); }
    .btn span { flex: 1; text-align: center; }
  </style>
</head>
<body>

<!-- Canvases -->
<canvas id="bg-canvas" class="fixed" style="z-index:0"></canvas>
<canvas id="rocket-canvas" class="fixed" style="z-index:10"></canvas>
<canvas id="ufo-canvas" class="fixed" style="z-index:11"></canvas>
<canvas id="intro-canvas" class="fixed" style="z-index:50;background:#000"></canvas>

<!-- Page -->
<div id="page">
  <h1 id="name-el">Sertan Nalça</h1>
  <p id="subtitle">AI Developer &amp; Creator</p>

  <div id="earth-wrap">
    <canvas id="sat-canvas"></canvas>
    <img id="earth-img"
      src="https://hercules-cdn.com/file_qMie9ZD5c779QEET9zEReo1k"
      alt="Earth" />
  </div>

  <div id="buttons">

    <!-- Instagram -->
    <a href="https://instagram.com/sertanalca" target="_blank" rel="noopener noreferrer" class="btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <defs>
          <linearGradient id="ig" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f09433"/>
            <stop offset="45%" stop-color="#dc2743"/>
            <stop offset="100%" stop-color="#bc1888"/>
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="20" height="20" rx="6" stroke="url(#ig)" stroke-width="2" fill="none"/>
        <circle cx="12" cy="12" r="4.5" stroke="url(#ig)" stroke-width="2" fill="none"/>
        <circle cx="17.5" cy="6.5" r="1.2" fill="url(#ig)"/>
      </svg>
      <span>Instagram</span>
    </a>

    <!-- WhatsApp -->
    <a href="https://wa.me/355692033673" target="_blank" rel="noopener noreferrer" class="btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.96 9.96 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z" stroke="#25D366" stroke-width="1.8" fill="none"/>
        <path d="M8.5 9.5c0-.5.2-1 .8-1.5.3-.2.6-.2.8 0l1.2 1.8c.2.3.1.6-.1.8l-.5.5c.4.8 1.2 1.6 2 2l.5-.5c.2-.2.5-.3.8-.1l1.8 1.2c.2.2.2.5 0 .8-.5.6-1 .8-1.5.8-2.5 0-5.5-3-5.8-5.8z" fill="#25D366"/>
      </svg>
      <span>WhatsApp</span>
    </a>

    <!-- Google Maps -->
    <a href="https://maps.google.com/?q=SolisDesign+Saranda" target="_blank" rel="noopener noreferrer" class="btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#EA4335"/>
        <circle cx="12" cy="9" r="2.5" fill="white"/>
      </svg>
      <span>SolisDesign – Sarandë</span>
    </a>

  </div>
</div>

<script>
// ── INTRO EXPLOSION ──
(function() {
  const canvas = document.getElementById('intro-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const CX = canvas.width / 2, CY = canvas.height / 2;
  const TOTAL = 380;
  const particles = [];
  for (let i = 0; i < TOTAL; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4.5 + 1.2;
    const life  = 90 + Math.floor(Math.random() * 80);
    particles.push({
      x: CX, y: CY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: Math.random() * 2.4 + 0.6,
      life, maxLife: life,
      spiralAngle: Math.random() * Math.PI * 2,
      spiralRadius: Math.random() * 18 + 4,
      spiralSpeed: (Math.random() * 0.12 + 0.05) * (Math.random() < 0.5 ? 1 : -1),
      waveFreq: Math.random() * 0.25 + 0.05,
      waveAmp: Math.random() * 3.5 + 1,
      waveOffset: Math.random() * Math.PI * 2,
      brightness: Math.floor(Math.random() * 55 + 200),
    });
  }
  let frame = 0;
  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const ov = Math.max(0, 1 - frame / 45);
    if (ov > 0) { ctx.fillStyle = `rgba(0,0,0,${ov})`; ctx.fillRect(0,0,canvas.width,canvas.height); }
    let any = false;
    for (const p of particles) {
      if (p.life <= 0) continue;
      any = true;
      p.spiralAngle += p.spiralSpeed;
      const sx = Math.cos(p.spiralAngle) * p.spiralRadius * (p.life / p.maxLife);
      const sy = Math.sin(p.spiralAngle) * p.spiralRadius * (p.life / p.maxLife);
      const perp = p.waveOffset + frame * p.waveFreq;
      const mag = Math.sqrt(p.vx**2 + p.vy**2) || 1;
      const px2 = -p.vy / mag, py2 = p.vx / mag;
      const wd = Math.sin(perp) * p.waveAmp;
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.985; p.vy *= 0.985; p.life--;
      const frac = p.life / p.maxLife;
      const b = p.brightness;
      ctx.save();
      ctx.globalAlpha = frac * 0.88;
      ctx.beginPath();
      ctx.arc(p.x + sx + px2*wd, p.y + sy + py2*wd, p.r*(0.5+frac*0.5), 0, Math.PI*2);
      ctx.fillStyle = `rgb(${b},${b},${b})`;
      ctx.shadowColor = 'rgba(200,220,255,0.9)';
      ctx.shadowBlur = 6;
      ctx.fill();
      ctx.restore();
    }
    frame++;
    if (!any || frame > 280) { canvas.style.display = 'none'; return; }
    requestAnimationFrame(tick);
  }
  tick();
})();

// ── BACKGROUND STARS ──
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [], W = 0, H = 0;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    stars = [];
    const n = Math.floor(W * H / 2600);
    for (let i = 0; i < n; i++)
      stars.push({ x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.4+0.25, a: Math.random()*0.7+0.2, sp: Math.random()*0.45+0.15 });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    for (const s of stars) {
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`; ctx.fill();
      s.x += s.sp*0.6; s.y += s.sp;
      if (s.y > H+4) { s.y = -4; s.x = Math.random()*W; }
      if (s.x > W+4) { s.x = -4; }
    }
    requestAnimationFrame(draw);
  }
  resize(); draw();
  window.addEventListener('resize', resize);
})();

// ── ORBITAL RINGS ──
(function() {
  const canvas = document.getElementById('sat-canvas');
  const ctx = canvas.getContext('2d');
  const S = 500; canvas.width = canvas.height = S;
  const CX = S/2, CY = S/2, EARTH_R = 110;
  const DOT_COLORS = ['#ffffff','#ffffff','#ffffff','#ffffff','#ffffff','#ffffff','#ffffff','#ffffff'];
  const ring1 = { rx:190, ry:62, tilt:-30*Math.PI/180, spd:0.007, phase:0, count:22 };
  const ring2 = { rx:220, ry:72, tilt:-15*Math.PI/180, spd:-0.005, phase:Math.PI*0.4, count:28 };
  const ring3 = { rx:148, ry:46, tilt:35*Math.PI/180, spd:0.009, phase:Math.PI*0.7, count:26 };
  function drawDot(sx,sy,r,color,alpha) {
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2);
    ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=8; ctx.fill(); ctx.restore();
  }
  function drawRing(ring, getColor, dotR) {
    ring.phase += ring.spd;
    const dots = [];
    for (let i=0; i<ring.count; i++) {
      const angle = ring.phase + (i*Math.PI*2)/ring.count;
      const ex = ring.rx*Math.cos(angle), ey = ring.ry*Math.sin(angle);
      const sx = CX + ex*Math.cos(ring.tilt) - ey*Math.sin(ring.tilt);
      const sy = CY + ex*Math.sin(ring.tilt) + ey*Math.cos(ring.tilt);
      const depth = Math.sin(angle);
      const isBehind = depth < 0;
      const dx=sx-CX, dy=sy-CY, dist=Math.sqrt(dx*dx+dy*dy);
      if (isBehind && dist < EARTH_R-8) continue;
      let alpha = isBehind ? 0.45 : 1.0;
      if (isBehind && dist < EARTH_R+16) alpha = ((dist-(EARTH_R-8))/24)*0.45;
      if (alpha < 0.02) continue;
      dots.push({ sx, sy, depth, color: getColor(i), alpha });
    }
    dots.sort((a,b) => a.depth-b.depth);
    for (const d of dots) drawDot(d.sx, d.sy, dotR, d.color, d.alpha);
  }
  function draw() {
    ctx.clearRect(0,0,S,S);
    drawRing(ring1, i => DOT_COLORS[i%DOT_COLORS.length], 3.5);
    drawRing(ring2, () => '#ffffff', 2.8);
    drawRing(ring3, () => '#4eff9a', 3.0);
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── ROCKET ──
(function() {
  const canvas = document.getElementById('rocket-canvas');
  const ctx = canvas.getContext('2d');
  const nameEl = document.getElementById('name-el');
  function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  let phase='waiting', waitTimer=0;
  const WAIT_FRAMES = 10*60;
  let rx=0,ry=0,tx=0,ty=0,angle=0,progress=0,startX=0,startY=0,particles=[];
  function getEarthCenter() {
    return { cx: canvas.width/2, cy: 172+250 };
  }
  function getSPos() {
    const rect = nameEl.getBoundingClientRect();
    const cw = rect.width/12;
    return { x: rect.left+cw*0.4, y: rect.top+rect.height*0.5 };
  }
  function launch() {
    const {cx,cy} = getEarthCenter();
    const la=-2.0, er=110;
    startX=cx+Math.cos(la)*er*0.55; startY=cy+Math.sin(la)*er*0.55;
    rx=startX; ry=startY;
    const s=getSPos(); tx=s.x; ty=s.y;
    angle=Math.atan2(ty-startY,tx-startX); progress=0; phase='flying';
  }
  function spawnEx() {
    particles=[];
    for (let i=0;i<60;i++) {
      const a=Math.random()*Math.PI*2, spd=Math.random()*3+0.5, life=40+Math.floor(Math.random()*40);
      particles.push({x:tx,y:ty,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-Math.random()*1.5,life,maxLife:life,r:Math.random()*2+0.8});
    }
  }
  function drawRocket(x,y,ang) {
    ctx.save(); ctx.translate(x,y); ctx.rotate(ang+Math.PI/2);
    ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(3,3); ctx.lineTo(-3,3); ctx.closePath();
    ctx.fillStyle='#e8f4ff'; ctx.shadowColor='rgba(100,180,255,0.9)'; ctx.shadowBlur=8; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-2,3); ctx.lineTo(0,8+Math.random()*3); ctx.lineTo(2,3); ctx.closePath();
    ctx.fillStyle=`rgba(255,${140+Math.floor(Math.random()*80)},40,0.9)`;
    ctx.shadowColor='rgba(255,120,0,0.8)'; ctx.shadowBlur=12; ctx.fill();
    ctx.restore();
  }
  function tick() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if (phase==='waiting'||phase==='done') {
      waitTimer++;
      if (waitTimer>=WAIT_FRAMES) { waitTimer=0; launch(); }
    } else if (phase==='flying') {
      progress+=0.004;
      const dist=Math.sqrt((tx-startX)**2+(ty-startY)**2);
      const midX=(startX+tx)/2, midY=(startY+ty)/2-dist*0.3;
      const t=progress, mt=1-t;
      rx=mt*mt*startX+2*mt*t*midX+t*t*tx;
      ry=mt*mt*startY+2*mt*t*midY+t*t*ty;
      const dxdt=2*(1-t)*(midX-startX)+2*t*(tx-midX);
      const dydt=2*(1-t)*(midY-startY)+2*t*(ty-midY);
      angle=Math.atan2(dydt,dxdt);
      drawRocket(rx,ry,angle);
      if (progress>=1) { spawnEx(); phase='exploding'; }
    } else if (phase==='exploding') {
      let alive=false;
      for (const p of particles) {
        if (p.life<=0) continue; alive=true;
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.life--;
        const frac=p.life/p.maxLife;
        ctx.save(); ctx.globalAlpha=frac*0.9;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='#ffffff'; ctx.shadowColor='rgba(200,220,255,0.8)'; ctx.shadowBlur=6; ctx.fill();
        ctx.restore();
      }
      if (!alive) { phase='done'; waitTimer=0; }
    }
    requestAnimationFrame(tick);
  }
  tick();
})();

// ── UFO ──
(function() {
  const canvas = document.getElementById('ufo-canvas');
  const ctx = canvas.getContext('2d');
  const nameEl = document.getElementById('name-el');
  function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  function getNPos() {
    const rect=nameEl.getBoundingClientRect();
    const cw=rect.width/12;
    return { x: rect.left+cw*7.4, y: rect.top };
  }
  let phase='waiting', timer=0;
  const WAIT_FRAMES=7*60, SIT_FRAMES=4*60;
  let spiralT=0, ufoCX=0, ufoCY=0, targetX=0, targetY=0, startX=0, leaveT=0, beamAlpha=0, beamDir=1;
  function startSpiral() {
    const n=getNPos(); targetX=n.x; targetY=n.y-14;
    startX=-60; ufoCX=startX; ufoCY=n.y-14; spiralT=0; phase='spiraling';
  }
  function drawUFO(x,y,scale) {
    ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
    if (phase==='sitting') {
      beamAlpha+=beamDir*0.04;
      if (beamAlpha>0.45) beamDir=-1;
      if (beamAlpha<0.05) beamDir=1;
      const grad=ctx.createLinearGradient(0,0,0,22);
      grad.addColorStop(0,`rgba(120,220,255,${beamAlpha})`);
      grad.addColorStop(1,'rgba(120,220,255,0)');
      ctx.beginPath(); ctx.moveTo(-10,4); ctx.lineTo(10,4); ctx.lineTo(14,26); ctx.lineTo(-14,26); ctx.closePath();
      ctx.fillStyle=grad; ctx.fill();
    }
    ctx.beginPath(); ctx.ellipse(0,-2,9,6,0,Math.PI,0);
    ctx.fillStyle='rgba(180,230,255,0.85)'; ctx.shadowColor='rgba(100,200,255,0.8)'; ctx.shadowBlur=8; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,2,16,5,0,0,Math.PI*2);
    ctx.fillStyle='#c0d8f0'; ctx.shadowColor='rgba(80,180,255,0.7)'; ctx.shadowBlur=10; ctx.fill();
    const rc=['#ff4444','#44aaff','#ffdd44','#44ff88','#ff4444','#44aaff'];
    rc.forEach((c,i) => {
      const a=(i/rc.length)*Math.PI*2+timer*0.08;
      ctx.beginPath(); ctx.arc(Math.cos(a)*11,2+Math.sin(a)*1.5,1.8,0,Math.PI*2);
      ctx.fillStyle=c; ctx.shadowColor=c; ctx.shadowBlur=5; ctx.fill();
    });
    ctx.restore();
  }
  function tick() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if (phase==='waiting') {
      timer++; if (timer>=WAIT_FRAMES) { timer=0; startSpiral(); }
    } else if (phase==='spiraling') {
      spiralT+=0.007;
      const n=getNPos(); targetX=n.x; targetY=n.y-14;
      const dist=targetX-startX, t=Math.min(spiralT,1), amp=28*(1-t);
      ufoCX=startX+dist*t; ufoCY=targetY+Math.sin(t*Math.PI*2*3)*amp;
      timer++; drawUFO(ufoCX,ufoCY,1);
      if (t>=1) { ufoCX=targetX; ufoCY=targetY; timer=0; beamAlpha=0.1; beamDir=1; phase='sitting'; }
    } else if (phase==='sitting') {
      const n=getNPos(); ufoCX=n.x; ufoCY=n.y-14;
      timer++; drawUFO(ufoCX,ufoCY,1);
      if (timer>=SIT_FRAMES) { timer=0; leaveT=0; phase='leaving'; }
    } else if (phase==='leaving') {
      leaveT+=0.015; ufoCX+=2.5; ufoCY-=1.8;
      drawUFO(ufoCX,ufoCY,Math.max(0,1-leaveT));
      if (leaveT>=1) { timer=0; phase='waiting'; }
    }
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
</body>
</html>
