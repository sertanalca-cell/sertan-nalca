<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sertan Nalça</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at 50% 30%, rgba(80, 100, 255, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(0, 255, 150, 0.08) 0%, transparent 60%),
                  #000000;
      background-size: cover;
      color: white;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Yıldızlı nebula arka plan efekti */
    .stars {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(white 1px, transparent 1px) 0 0 / 80px 80px,
        radial-gradient(white 1px, transparent 1px) 40px 40px / 80px 80px,
        url('https://picsum.photos/id/1015/1920/1080') center/cover;
      opacity: 0.75;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: screen;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(100, 180, 255, 0.9);
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 1.45rem;
      color: #a0d0ff;
      margin-bottom: 70px;
      font-weight: 400;
      letter-spacing: 3px;
    }

    /* Dünya */
    .earth {
      width: 290px;
      height: 290px;
      background: url('https://sertanalca-cell.github.io/assets/earth.png') center/cover no-repeat; /* İstersen kendi görsel linkini buraya koy */
      border-radius: 50%;
      box-shadow: 
        0 0 60px rgba(0, 255, 120, 0.7),
        0 0 120px rgba(80, 180, 255, 0.5),
        inset 0 0 80px rgba(255,255,255,0.2);
      margin-bottom: 90px;
      animation: glow 8s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 60px rgba(0, 255, 120, 0.7), 0 0 120px rgba(80, 180, 255, 0.5); }
      to   { box-shadow: 0 0 90px rgba(0, 255, 120, 0.9), 0 0 160px rgba(80, 180, 255, 0.7); }
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 320px;
      z-index: 2;
    }

    .btn {
      padding: 17px 28px;
      border-radius: 50px;
      font-size: 1.15rem;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: all 0.4s ease;
      border: none;
      cursor: pointer;
    }

    .btn-instagram {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      border: 1.5px solid rgba(255, 255, 255, 0.35);
    }

    .btn-instagram:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: translateY(-4px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
    }

    .btn-whatsapp {
      background: #25D366;
      color: white;
    }

    .btn-whatsapp:hover {
      background: #20c35e;
      transform: translateY(-4px);
      box-shadow: 0 15px 30px rgba(37, 211, 102, 0.4);
    }

    .icon {
      width: 26px;
      height: 26px;
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <div class="content">
    <h1>Sertan Nalça</h1>
    <p class="subtitle">AI Developer & Creator</p>

    <div class="earth"></div>

    <div class="buttons">
      <a href="https://www.instagram.com/sertanalca" target="_blank" class="btn btn-instagram">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram" class="icon">
        Instagram
      </a>
      
      <a href="https://wa.me/355692033673" target="_blank" class="btn btn-whatsapp">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="icon">
        WhatsApp
      </a>
    </div>
  </div>

</body>
</html>
