<!DOCTYPE html>
<html lang="tr">
<head>

    <title>Sertan Nalça - AI Developer & Creator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .content {
            text-align: center;
            color: white;
            margin-bottom: 200px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.5);
        }

        .subtitle {
            font-size: 1.5rem;
            color: #00c8ff;
            letter-spacing: 1px;
            font-weight: 300;
        }

        .buttons-container {
            position: absolute;
            bottom: 100px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
        }

        .btn {
            padding: 16px 24px;
            font-size: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            border-color: rgba(0, 200, 255, 0.8);
            background: rgba(0, 200, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn svg {
            width: 24px;
            height: 24px;
        }

        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.3);
            z-index: 20;
            border-bottom: 1px solid rgba(0, 200, 255, 0.2);
        }

        .navbar-menu {
            width: 30px;
            height: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            cursor: pointer;
        }

        .navbar-menu span {
            width: 100%;
            height: 2px;
            background: white;
            border-radius: 2px;
        }

        .navbar-url {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            flex: 1;
            text-align: center;
        }

        .navbar-icon {
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="navbar-url">🔒 sertanalca-cell.github.io</div>
        <div class="navbar-icon">⟳</div>
    </div>

    <div class="container">
        <div class="content">
            <h1>Sertan Nalça</h1>
            <p class="subtitle">AI Developer & Creator</p>
        </div>

        <div class="buttons-container">
            <a href="#instagram" class="btn">
                <svg viewBox="0 0 24 24" fill="currentColor">

                </svg>

            <a href="#whatsapp" class="btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.67-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.076 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421-7.403h-.004c-1.574 0-3.088.615-4.236 1.728-1.148 1.113-1.78 2.588-1.78 4.153 0 1.747.92 3.361 2.537 4.286l-.36 1.286 1.468-.747c1.154.628 2.428.992 3.771.992h.004c1.574 0 3.088-.615 4.236-1.729 1.147-1.112 1.78-2.587 1.78-4.153 0-1.746-.92-3.36-2.537-4.286l.36-1.286-1.468.747a5.34 5.34 0 0 0-2.672-.688zM23 12c0 6.075-4.925 11-11 11S1 18.075 1 12 5.925 1 12 1s11 4.925 11 11z"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 3;

        // Create Starfield
        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starCount = 1000;
            const positions = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 100;
                positions[i + 1] = (Math.random() - 0.5) * 100;
                positions[i + 2] = (Math.random() - 0.5) * 100;
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.1,
                sizeAttenuation: true
            });

            return new THREE.Points(starsGeometry, starsMaterial);
        }

        const stars = createStars();
        scene.add(stars);

        // Create Earth
        const geometry = new THREE.SphereGeometry(1, 64, 64);

        // Create canvas texture for Earth
        const canvas = document.createElement('canvas');
        canvas.width = 2048;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');

        // Fill ocean
        ctx.fillStyle = '#0066cc';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Add continents (simplified)
        ctx.fillStyle = '#00aa00';
        
        // North America
        ctx.beginPath();
        ctx.ellipse(200, 300, 150, 200, -0.3, 0, Math.PI * 2);
        ctx.fill();

        // South America
        ctx.beginPath();
        ctx.ellipse(350, 500, 80, 150, 0.2, 0, Math.PI * 2);
        ctx.fill();

        // Europe
        ctx.beginPath();
        ctx.ellipse(700, 250, 100, 80, 0, 0, Math.PI * 2);
        ctx.fill();

        // Africa
        ctx.beginPath();
        ctx.ellipse(850, 450, 120, 150, 0, 0, Math.PI * 2);
        ctx.fill();

        // Asia
        ctx.beginPath();
        ctx.ellipse(1200, 300, 200, 180, 0, 0, Math.PI * 2);
        ctx.fill();

        // Australia
        ctx.beginPath();
        ctx.ellipse(1400, 600, 70, 80, 0, 0, Math.PI * 2);
        ctx.fill();

        // Add glow effect with gradient
        const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, 600);
        gradient.addColorStop(0, 'rgba(0, 200, 255, 0.3)');
        gradient.addColorStop(1, 'rgba(0, 100, 150, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const texture = new THREE.CanvasTexture(canvas);
        const material = new THREE.MeshPhongMaterial({ 
            map: texture,
            emissive: 0x00ccff,
            emissiveIntensity: 0.3
        });

        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        // Add lighting
        const light = new THREE.PointLight(0xffffff, 1.5);
        light.position.set(5, 3, 5);
        scene.add(light);

        const ambientLight = new THREE.AmbientLight(0x404040, 1);
        scene.add(ambientLight);

        // Animation
        function animate() {
            requestAnimationFrame(animate);

            // Rotate Earth
            earth.rotation.y += 0.001;

            // Rotate stars
            stars.rotation.y += 0.0001;

            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Button interactions
        document.querySelector('a[href="#instagram"]').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Instagram profilinize yönlendirilecektir');
        });

        document.querySelector('a[href="#whatsapp"]').addEventListener('click', (e) => {
            e.preventDefault();
            alert('WhatsApp\'a yönlendirilecektir');
        });
    </script>
</body>
</html>
