<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sertan Nalça</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
}

/* MILKY WAY BACKGROUND */
#galaxy{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://upload.wikimedia.org/wikipedia/commons/3/3f/Milky_Way_IR_Spitzer.jpg");
  background-size:cover;
  background-position:center;
  opacity:0.35;
  z-index:-2;
}

/* STARS */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.7;
}

/* PROFILE */
#profile{
  position:absolute;
  top:20px;
  left:20px;
  z-index:10;
}

#profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid white;
  cursor:pointer;
}

/* CENTER TEXT */
#center{
  position:absolute;
  bottom:110px;
  width:100%;
  text-align:center;
}

.card{
  display:inline-block;
  padding:10px 18px;
  margin:5px;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

/* ADMIN */
#admin{
  display:none;
  position:absolute;
  top:20px;
  right:20px;
  background:rgba(0,0,0,0.75);
  padding:10px;
  border-radius:10px;
}
input{
  width:160px;
  margin:5px;
}
</style>
</head>

<body>

<div id="galaxy"></div>

<canvas id="bg"></canvas>

<div id="profile">
  <img id="pfp" onclick="openAdmin()">
</div>

<div id="center">
  <div class="card" style="font-size:22px;">Sertan Nalça</div><br>
  <div class="card">+355692033673</div>
</div>

<div id="admin">
  <input id="pass" placeholder="Password"><br>
  <input id="img" placeholder="Profile Photo URL"><br>
  <button onclick="save()">Save</button>
</div>

<script>

/* ===== FLOATING STARS (soft movement) ===== */
for(let i=0;i<200;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);

  animateStar(s);
}

function animateStar(el){
  let x = Math.random()*2-1;
  let y = Math.random()*2-1;

  function move(){
    let rect = el.getBoundingClientRect();
    el.style.left = rect.left + x + "px";
    el.style.top = rect.top + y + "px";

    if(rect.left<0 || rect.left>window.innerWidth) x*=-1;
    if(rect.top<0 || rect.top>window.innerHeight) y*=-1;

    requestAnimationFrame(move);
  }
  move();
}

/* ===== THREE JS (EARTH + MOON 3D) ===== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);
camera.position.z = 3;

/* EARTH */
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg")
  })
);
scene.add(earth);

/* MOON */
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.27,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/moon_1024.jpg")
  })
);
scene.add(moon);

/* ANIMATE */
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;

  moon.position.x = Math.sin(Date.now()*0.001)*2;
  moon.position.z = Math.cos(Date.now()*0.001)*2;

  renderer.render(scene,camera);
}
animate();

/* ===== PROFILE ADMIN ===== */
function openAdmin(){
  document.getElementById("admin").style.display="block";
}

function save(){
  if(pass.value !== "Sertan2906"){
    alert("Wrong password");
    return;
  }

  localStorage.setItem("pfp",img.value);
  load();
  alert("Saved");
}

/* LOAD */
function load(){
  pfp.src = localStorage.getItem("pfp") || "https://i.imgur.com/8Km9tLL.png";
}
load();

</script>

</body>
</html>
