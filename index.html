<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sertan Nalça</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* 3D CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
}

/* STAR FIELD */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.8;
}

.shooting{
  position:absolute;
  width:2px;
  height:90px;
  background:linear-gradient(white,transparent);
  animation:shoot 2s linear forwards;
}

@keyframes shoot{
  from{transform:translate(0,0) rotate(45deg);}
  to{transform:translate(400px,400px) rotate(45deg);opacity:0;}
}

/* PROFILE */
#profile{
  position:absolute;
  top:25px;
  left:25px;
  text-align:center;
  z-index:10;
}

#profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid white;
  cursor:pointer;
}

/* INFO CENTER */
#info{
  position:absolute;
  bottom:120px;
  width:100%;
  text-align:center;
}

.card{
  display:inline-block;
  padding:12px 22px;
  margin:5px;
  border-radius:16px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
}

/* ADMIN PANEL */
#admin{
  display:none;
  position:absolute;
  top:20px;
  right:20px;
  background:rgba(0,0,0,0.75);
  padding:12px;
  border-radius:12px;
  z-index:20;
}

input{
  width:170px;
  margin:5px;
  padding:5px;
}

/* NAME STYLE */
#name, #surname{
  color:white;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- PROFILE -->
<div id="profile">
  <img id="pfp" onclick="openAdmin()">
  <small>Profile</small>
</div>

<!-- INFO -->
<div id="info">
  <div class="card" id="name"></div><br>
  <div class="card" id="surname"></div><br>
  <div class="card">Contact Nr: 00355692033673</div>
</div>

<!-- ADMIN -->
<div id="admin">
  <input id="pass" placeholder="Password"><br>
  <input id="img" placeholder="Photo URL"><br>
  <input id="nameInput" placeholder="Name"><br>
  <input id="surnameInput" placeholder="Surname"><br>
  <button onclick="save()">Save</button>
</div>

<script>

/* ===== STARS ===== */
for(let i=0;i<250;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);
}

/* SHOOTING STARS */
setInterval(()=>{
  let s=document.createElement("div");
  s.className="shooting";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*50+"vh";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),2000);
},3500);

/* ===== THREE JS SPACE ===== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);
camera.position.z=3;

/* EARTH */
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg")
  })
);
scene.add(earth);

/* MOON */
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.25,32,32),
  new THREE.MeshBasicMaterial({
    map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/moon_1024.jpg")
  })
);
scene.add(moon);

/* ANIMATE */
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;

  moon.position.x = Math.sin(Date.now()*0.001)*2;
  moon.position.z = Math.cos(Date.now()*0.001)*2;

  renderer.render(scene,camera);
}
animate();

/* ===== ADMIN SYSTEM ===== */
function openAdmin(){
  document.getElementById("admin").style.display="block";
}

function save(){
  if(pass.value !== "Sertan2906"){
    alert("Wrong password");
    return;
  }

  localStorage.setItem("img",img.value);
  localStorage.setItem("name",nameInput.value);
  localStorage.setItem("surname",surnameInput.value);

  load();
  alert("Saved");
}

/* LOAD DATA */
function load(){
  pfp.src = localStorage.getItem("img") || "https://i.imgur.com/8Km9tLL.png";
  name.innerText = localStorage.getItem("name") || "Sertan";
  surname.innerText = localStorage.getItem("surname") || "Nalça";
}

load();

</script>

</body>
</html>
