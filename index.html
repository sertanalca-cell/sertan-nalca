<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sertan Nalça</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      background: #000000 url('https://picsum.photos/id/1015/1920/1080') center/cover;
      background-size: cover;
      color: white;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Yıldız efekti */
    .stars {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: transparent;
      box-shadow: 
        50px 80px 1px #fff,
        120px 200px 1px #fff,
        300px 150px 1px #fff,
        450px 300px 1px #fff,
        600px 80px 1px #fff,
        750px 250px 1px #fff,
        900px 120px 1px #fff,
        1100px 350px 1px #fff;
      opacity: 0.6;
      animation: twinkle 8s infinite alternate;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes twinkle {
      0% { opacity: 0.5; }
      100% { opacity: 0.9; }
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    h1 {
      font-size: 3.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(150, 200, 255, 0.9);
    }

    .subtitle {
      font-size: 1.4rem;
      color: #b0c0ff;
      margin-bottom: 70px;
      letter-spacing: 2px;
    }

    /* Dönen Dünya */
    .earth-container {
      width: 290px;
      height: 290px;
      margin: 0 auto 80px;
      perspective: 1000px;
    }

    .earth {
      width: 100%;
      height: 100%;
      background: url('https://i.imgur.com/2vK8z3L.png') center/cover; /* Glowing yeşil devreli dünya */
      border-radius: 50%;
      box-shadow: 
        0 0 70px rgba(0, 255, 120, 0.8),
        0 0 140px rgba(80, 180, 255, 0.6),
        inset 0 0 60px rgba(255,255,255,0.2);
      animation: rotateEarth 35s linear infinite;
      border: 3px solid rgba(0, 255, 180, 0.4);
    }

    @keyframes rotateEarth {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(360deg); }
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 340px;
      z-index: 2;
    }

    .btn {
      padding: 16px 24px;
      border-radius: 50px;
      font-size: 1.12rem;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s ease;
    }

    .btn-instagram {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1.5px solid rgba(255,255,255,0.4);
    }

    .btn-instagram:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-3px);
    }

    .btn-whatsapp {
      background: #25D366;
      color: white;
    }

    .btn-whatsapp:hover {
      background: #20c35e;
      transform: translateY(-3px);
    }

    .icon {
      width: 26px;
      height: 26px;
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <div class="content">
    <h1>Sertan Nalça</h1>
    <p class="subtitle">AI Developer & Creator</p>

    <div class="earth-container">
      <div class="earth"></div>
    </div>

    <div class="buttons">
      <a href="https://www.instagram.com/sertanalca" target="_blank" class="btn btn-instagram">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram" class="icon">
        Instagram
      </a>
      
      <a href="https://wa.me/355692033673" target="_blank" class="btn btn-whatsapp">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="icon">
        WhatsApp
      </a>
    </div>
  </div>

</body>
</html>
