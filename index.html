<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertan Nalça • Digital Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .space-bg {
            background: linear-gradient(to bottom, #000011 0%, #0a001f 100%);
            background-image: url('https://picsum.photos/id/1015/2000/1200'); /* Derin uzay nebula - değiştirebilirsin */
            background-size: cover;
            background-position: center;
            animation: subtleDrift 100s linear infinite;
        }

        @keyframes subtleDrift {
            0% { background-position: 20% 50%; }
            100% { background-position: 80% 50%; }
        }

        .globe-container {
            width: 210px;
            height: 210px;
            position: relative;
            margin: 0 auto 40px;
        }

        .globe {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 32%, #67e8f9, #22c55e 35%, #166534 65%, #052e16);
            box-shadow: 
                0 0 70px rgba(103, 232, 249, 0.7),
                inset 35px 30px 50px rgba(255,255,255,0.3),
                inset -40px -40px 70px rgba(0,0,0,0.8);
            animation: rotateGlobe 40s linear infinite;
            position: relative;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.15);
        }

        .globe::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.4) 8%, transparent 55%);
            animation: shine 10s linear infinite;
        }

        @keyframes rotateGlobe {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        @keyframes shine {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(280%); }
        }

        .moon {
            position: absolute;
            width: 36px;
            height: 36px;
            background: #e2e8f0;
            border-radius: 50%;
            box-shadow: 0 0 18px #e2e8f0, inset 6px 6px 10px rgba(0,0,0,0.5);
            top: 15px;
            left: 170px;
            animation: moonOrbit 32s linear infinite;
        }

        @keyframes moonOrbit {
            from { transform: rotate(0deg) translateX(98px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(98px) rotate(-360deg); }
        }

        .link-btn {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 15px;
            padding: 14px 20px;
        }
        
        .link-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
        }
    </style>
</head>
<body class="space-bg min-h-screen flex items-center justify-center py-10 px-4 text-white relative">

    <div class="max-w-md w-full text-center z-10">
        
        <!-- İsim (daha küçük) -->
        <h1 class="text-4xl font-bold tracking-tighter mb-1 text-white drop-shadow-xl" 
            style="font-family: 'Playfair Display', serif;">
            Sertan Nalça
        </h1>
        <p class="text-purple-300 text-lg mb-10">AI Developer & Creator</p>

        <!-- Gerçekçi Dönen Dünya -->
        <div class="globe-container">
            <div class="globe"></div>
            <!-- Ay -->
            <div class="moon"></div>
        </div>

        <!-- Link Butonları (daha küçük) -->
        <div class="space-y-3 px-6">
            <a href="https://instagram.com/sertanalca" target="_blank" 
               class="link-btn block bg-white/10 hover:bg-white/20 border border-white/30 font-medium rounded-3xl flex items-center justify-center gap-3 backdrop-blur-md">
                <i class="fab fa-instagram text-2xl"></i>
                <span>Instagram</span>
            </a>
            
            <a href="https://wa.me/355692033673" target="_blank" 
               class="link-btn block bg-white/10 hover:bg-white/20 border border-white/30 font-medium rounded-3xl flex items-center justify-center gap-3 backdrop-blur-md">
                <i class="fab fa-whatsapp text-2xl"></i>
                <span>WhatsApp</span>
            </a>
            
            <a href="https://www.google.com/maps/search/?api=1&query=Sarand%C3%AB" target="_blank" 
               class="link-btn block bg-white/10 hover:bg-white/20 border border-white/30 font-medium rounded-3xl flex items-center justify-center gap-3 backdrop-blur-md">
                📍 <span>Konumum - Sarandë</span>
            </a>
            
            <a href="https://yourwebsite.com" target="_blank" 
               class="link-btn block bg-white/10 hover:bg-white/20 border border-white/30 font-medium rounded-3xl flex items-center justify-center gap-3 backdrop-blur-md">
                🌐 Web Sitesim
            </a>
            
            <a href="https://github.com/yourusername" target="_blank" 
               class="link-btn block bg-white/10 hover:bg-white/20 border border-white/30 font-medium rounded-3xl flex items-center justify-center gap-3 backdrop-blur-md">
                <i class="fab fa-github text-2xl"></i>
                <span>GitHub Projelerim</span>
            </a>
        </div>

        <p class="text-white/40 text-xs mt-12">Sertan Nalça • Digital Identity Card</p>
    </div>

    <!-- Yıldız efekti -->
    <div class="absolute inset-0 pointer-events-none" 
         style="background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 2px); background-size: 70px 70px;"></div>
</body>
</html>
