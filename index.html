<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Georgia;
}

/* 🌌 SAMANYOLU ARKA PLAN (SENİN GÖRSEL) */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('galaxy.jpg') center/cover no-repeat;
  z-index: -2;
}

/* 3D canvas üstte */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.content {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 10%;
  color: white;
}

.subtitle {
  color: #b48cff;
  transition: 1s;
}

/* butonlar */
.buttons {
  position: absolute;
  bottom: 80px;
  width: 100%;
}

.btn {
  width: 80%;
  margin: 10px auto;
  padding: 15px;
  border-radius: 25px;
  background: rgba(0,0,0,0.4);
  color: white;
  position: relative;
  overflow: hidden;
}

/* 🚀 dönen obje */
.ship {
  position: absolute;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  animation: spin 6s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg) translateX(120px); }
  100% { transform: rotate(360deg) translateX(120px); }
}
</style>
</head>

<body>

<div class="bg"></div>
<canvas id="c"></canvas>

<div class="content">
  <h1>Sertan Nalça</h1>
  <div class="subtitle" id="text">AI Developer & Creator</div>
</div>

<div class="buttons">
  <div class="btn" onclick="window.location='https://instagram.com/sertanalca'">
    Instagram
    <div class="ship"></div>
  </div>

  <div class="btn" onclick="window.location='https://wa.me/355692033673'">
    WhatsApp
    <div class="ship"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById("c"), alpha:true});
renderer.setSize(innerWidth, innerHeight);

camera.position.z = 4;

// 🌍 GERÇEKÇİ DÜNYA
const loader = new THREE.TextureLoader();

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  new THREE.MeshStandardMaterial({
    map: loader.load('https://threejs.org/examples/textures/earth_atmos_2048.jpg')
  })
);
scene.add(earth);

// 🌙 AY
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.27, 32, 32),
  new THREE.MeshStandardMaterial({
    map: loader.load('https://threejs.org/examples/textures/moon_1024.jpg')
  })
);
scene.add(moon);

// ☀️ GÜNEŞ IŞIĞI → yarısı aydınlık yarısı karanlık
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(5, 2, 5);
scene.add(light);

let angle = 0;

function animate(){
  requestAnimationFrame(animate);

  // dünya dönüyor
  earth.rotation.y += 0.002;

  // ay dönüyor
  angle += 0.01;
  moon.position.set(Math.sin(angle)*2, 0, Math.cos(angle)*2);

  // kamera uzaklaşıyor (cosmos hissi)
  camera.position.z += 0.0005;

  renderer.render(scene, camera);
}
animate();

// ✨ YAZI TOZ EFEKTİ
const t = document.getElementById("text");

setInterval(()=>{
  t.style.opacity = 0;

  setTimeout(()=>{
    t.innerText = t.innerText.includes("AI")
      ? "I'm creating something amazing for everyone"
      : "AI Developer & Creator";

    t.style.opacity = 1;
  },1000);

},5000);
</script>

</body>
</html>
