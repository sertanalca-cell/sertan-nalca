<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sertan Nalça</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Yıldızlar - Soldan sağa hareket */
    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      z-index: 1;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: moveStars linear infinite;
    }

    @keyframes moveStars {
      from { transform: translateX(-100px); }
      to { transform: translateX(calc(100vw + 100px)); }
    }

    /* Dünya ve yörüngesi */
    .earth-container {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 40px 0;
      z-index: 2;
    }

    .earth {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: url('https://i.ibb.co/0jZxK8z/earth-digital.png') center/cover no-repeat;
      box-shadow: 0 0 60px rgba(0, 255, 255, 0.6),
                  0 0 120px rgba(0, 100, 255, 0.3);
      animation: earthGlow 8s ease-in-out infinite alternate;
    }

    /* Dünya etrafındaki dönen noktalar */
    .orbit {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 280px;
      border-radius: 50%;
      pointer-events: none;
    }

    .orbit-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 12px white;
      animation: orbitRotate linear infinite;
    }

    @keyframes orbitRotate {
      from { transform: rotate(0deg) translateX(140px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(140px) rotate(-360deg); }
    }

    /* Metinler */
    h1 {
      font-size: 4.5rem;
      font-weight: 700;
      text-align: center;
      z-index: 3;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(255,255,255,0.8);
    }

    p {
      font-size: 1.4rem;
      color: #a0d8ff;
      letter-spacing: 4px;
      margin-bottom: 60px;
      z-index: 3;
    }

    /* Butonlar */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 380px;
      z-index: 3;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 18px 28px;
      border-radius: 50px;
      text-decoration: none;
      color: white;
      font-size: 1.3rem;
      font-weight: 500;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0, 200, 255, 0.3);
    }

    .btn img {
      width: 28px;
      height: 28px;
    }
  </style>
</head>
<body>

  <!-- Arka plan yıldızları -->
  <div class="stars" id="stars"></div>

  <h1>Sertan Nalça</h1>
  <p>AI DEVELOPER & CREATOR</p>

  <div class="earth-container">
    <div class="earth" id="earth"></div>
    
    <!-- Dönme yörüngesi -->
    <div class="orbit" id="orbit"></div>
  </div>

  <div class="buttons">
    <a href="https://instagram.com" target="_blank" class="btn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram">
      Instagram
    </a>
    <a href="https://wa.me" target="_blank" class="btn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
      WhatsApp
    </a>
  </div>

  <script>
    // Arka plan yıldızlarını oluştur (soldan sağa hareket)
    function createStars() {
      const starsContainer = document.getElementById('stars');
      
      for (let i = 0; i < 250; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        
        const size = Math.random() * 3.5 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        
        star.style.top = `${Math.random() * 100}vh`;
        star.style.left = `${Math.random() * -50}px`;
        
        const duration = Math.random() * 25 + 35; // 35-60 saniye arası
        star.style.animationDuration = `${duration}s`;
        
        star.style.opacity = Math.random() * 0.8 + 0.2;
        
        starsContainer.appendChild(star);
      }
    }

    // Dünya etrafındaki dönen noktalar
    function createOrbitDots() {
      const orbit = document.getElementById('orbit');
      const numDots = 18;
      
      for (let i = 0; i < numDots; i++) {
        const dot = document.createElement('div');
        dot.className = 'orbit-dot';
        
        const delay = (i * 1.2);
        dot.style.animationDelay = `-${delay}s`;
        
        // Farklı hızlar için biraz varyasyon
        const duration = 22 + Math.random() * 8;
        dot.style.animationDuration = `${duration}s`;
        
        dot.style.width = `${6 + Math.random() * 4}px`;
        dot.style.height = dot.style.width;
        
        orbit.appendChild(dot);
      }
    }

    // Sayfa yüklendiğinde çalıştır
    window.onload = () => {
      createStars();
      createOrbitDots();
    };
  </script>
</body>
</html>
