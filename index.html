<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sertan Nalça</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Georgia', serif;
  background: black;
}

#bg {
  position: fixed;
  width: 100%;
  height: 100%;
}

.content {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 10%;
  color: white;
}

h1 {
  font-size: 40px;
}

.subtitle {
  font-size: 18px;
  color: #caa7ff;
  transition: opacity 1s;
}

.buttons {
  position: absolute;
  bottom: 80px;
  width: 100%;
}

.btn {
  width: 80%;
  margin: 10px auto;
  padding: 15px;
  border-radius: 25px;
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 18px;
  border: 1px solid rgba(255,255,255,0.2);
  position: relative;
  overflow: hidden;
}

.orbit {
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: white;
  animation: orbit 4s linear infinite;
}

@keyframes orbit {
  0% { transform: rotate(0deg) translateX(100px) rotate(0deg); }
  100% { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="content">
  <h1>Sertan Nalça</h1>
  <div class="subtitle" id="subtitle">AI Developer & Creator</div>
</div>

<div class="buttons">
  <div class="btn" onclick="window.location='https://instagram.com/sertanalca'">
    Instagram
    <div class="orbit"></div>
  </div>

  <div class="btn" onclick="window.location='https://wa.me/355692033673'">
    WhatsApp
    <div class="orbit"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('bg')});
renderer.setSize(window.innerWidth, window.innerHeight);

camera.position.z = 5;

// 🌍 Dünya
const textureLoader = new THREE.TextureLoader();

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  new THREE.MeshStandardMaterial({
    map: textureLoader.load('https://threejs.org/examples/textures/earth_atmos_2048.jpg'),
    roughness: 1,
    metalness: 0
  })
);

scene.add(earth);

// 🌙 Ay
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.27, 32, 32),
  new THREE.MeshStandardMaterial({
    map: textureLoader.load('https://threejs.org/examples/textures/moon_1024.jpg')
  })
);

scene.add(moon);

// 💡 Işık (güneş etkisi)
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(5, 3, 5);
scene.add(light);

// ⭐ yıldızlar
const starsGeometry = new THREE.BufferGeometry();
const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff });

const starVertices = [];
for (let i = 0; i < 10000; i++) {
  starVertices.push((Math.random() - 0.5) * 2000);
  starVertices.push((Math.random() - 0.5) * 2000);
  starVertices.push((Math.random() - 0.5) * 2000);
}

starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// 🌌 animasyon
let angle = 0;

function animate() {
  requestAnimationFrame(animate);

  // dünya dönüyor
  earth.rotation.y += 0.002;

  // ay dünya etrafında dönüyor
  angle += 0.01;
  moon.position.set(Math.sin(angle) * 2, 0, Math.cos(angle) * 2);

  // yıldız akışı (cosmos hissi)
  stars.position.z += 0.1;
  if (stars.position.z > 100) stars.position.z = 0;

  renderer.render(scene, camera);
}

animate();

// ✨ yazı döngüsü
const subtitle = document.getElementById("subtitle");

setInterval(() => {
  subtitle.style.opacity = 0;

  setTimeout(() => {
    if (subtitle.innerText === "AI Developer & Creator") {
      subtitle.innerText = "I'm creating something amazing for everyone";
    } else {
      subtitle.innerText = "AI Developer & Creator";
    }
    subtitle.style.opacity = 1;
  }, 1000);

}, 5000);

</script>

</body>
</html>
