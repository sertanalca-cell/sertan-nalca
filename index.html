<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sertan nalça • uzay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
        }
        
        canvas {
            display: block;
        }
        
        .header-text {
            font-size: 18px;
            letter-spacing: 3px;
            font-weight: 400;
        }
        
        .earth-container {
            filter: drop-shadow(0 0 80px rgba(100, 200, 255, 0.6));
        }
        
        .orbit-svg {
            animation: subtle-orbit 120s linear infinite;
        }
    </style>
</head>
<body class="bg-black text-white">
    <!-- Yıldızlar için Canvas (tam ekran, interaktif) -->
    <canvas id="stars" class="fixed inset-0 z-0 pointer-events-auto"></canvas>

    <!-- İçerik katmanı -->
    <div class="relative z-10 min-h-screen flex flex-col">
        
        <!-- Üst başlık - Fotoğraftaki NASA alanının yerine tam olarak istediğin gibi -->
        <header class="flex items-center justify-between px-6 py-4 bg-black/80 backdrop-blur-lg border-b border-white/10 fixed top-0 left-0 right-0 z-50">
            
            <!-- Sol taraf: küçük "sertan nalça" -->
            <div class="header-text text-white/90 tracking-[2px]">
                sertan nalça
            </div>
            
            <!-- Sağ taraf: renkli Instagram ve WhatsApp ikonları (küçük, gerçek ikonlar) -->
            <div class="flex items-center gap-5">
                <!-- Instagram -->
                <a href="https://www.instagram.com/" target="_blank" 
                   class="transition-transform hover:scale-110 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="#E1306C">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.849.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.33.56 2.463.292 6.81.234 8.09.222 8.47.222 12c0 3.53.012 3.91.07 5.19.268 4.347 2.403 6.48 6.76 6.738 1.28.058 1.688.072 4.947.072 3.26 0 3.667-.014 4.947-.072 4.358-.258 6.493-2.391 6.761-6.738.058-1.28.072-1.688.072-5.19 0-3.53-.012-3.91-.07-5.19C23.44 2.463 21.305.33 16.947.072 15.667.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zm0 10.162a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 11-2.88 0 1.44 1.44 0 012.88 0z"/>
                    </svg>
                </a>
                
                <!-- WhatsApp -->
                <a href="https://wa.me/" target="_blank" 
                   class="transition-transform hover:scale-110 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="#25D366">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.198.297-.767.966-.94 1.164-.173.198-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.485-.888-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.67-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.355L0 21.997l1.395-5.1a9.813 9.813 0 01-1.29-5.226 9.887 9.887 0 0110.01-9.877 9.85 9.85 0 017.02 2.906 9.85 9.85 0 012.906 7.02 9.887 9.887 0 01-9.877 10.01z"/>
                    </svg>
                </a>
            </div>
        </header>

        <!-- Dünya ve yörüngeler (fotoğraftaki gibi merkezde) -->
        <div class="flex-1 flex items-center justify-center relative">
            
            <!-- Yörüngeler (beyaz, iç içe geçmiş, fotoğraftaki gibi) -->
            <svg id="orbits" width="520" height="520" class="orbit-svg absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-10 pointer-events-none" viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg">
                <!-- Yörünge 1 -->
                <ellipse cx="260" cy="260" rx="240" ry="105" transform="rotate(-35 260 260)" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.35"/>
                <!-- Yörünge 2 -->
                <ellipse cx="260" cy="260" rx="225" ry="135" transform="rotate(25 260 260)" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
                <!-- Yörünge 3 -->
                <ellipse cx="260" cy="260" rx="255" ry="88" transform="rotate(-55 260 260)" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.25"/>
                <!-- Yörünge 4 -->
                <ellipse cx="260" cy="260" rx="200" ry="155" transform="rotate(40 260 260)" fill="none" stroke="white" stroke-width="1.8" stroke-opacity="0.4"/>
                <!-- Yörünge 5 (daha küçük, çapraz) -->
                <ellipse cx="260" cy="260" rx="180" ry="115" transform="rotate(-15 260 260)" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.35"/>
                <!-- Yörünge 6 (dış halka) -->
                <ellipse cx="260" cy="260" rx="265" ry="95" transform="rotate(70 260 260)" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.2"/>
            </svg>

            <!-- Dünya (fotoğraftaki gibi net, parlak, mavi-beyaz) -->
            <div class="earth-container relative z-20">
                <img id="earth" 
                     src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/The_Earth_seen_from_Apollo_17.jpg/600px-The_Earth_seen_from_Apollo_17.jpg"
                     alt="Earth"
                     class="w-[380px] h-[380px] md:w-[420px] md:h-[420px] rounded-full object-cover border border-white/30 shadow-2xl">
            </div>
        </div>
    </div>

    <script>
        // Tailwind script zaten yüklü, ekstra config gerekmez
        const canvas = document.getElementById('stars')
        const ctx = canvas.getContext('2d')
        
        let stars = []
        let width = window.innerWidth
        let height = window.innerHeight
        let cx = width / 2
        let cy = height / 2
        let angle = 0
        let isDragging = false
        let prevX = 0
        let prevY = 0
        
        // Yıldız renkleri (sarı, mavi, beyaz - istediğin gibi)
        const colors = ['#FFEE77', '#77DDFF', '#F8F8FF', '#AADDFF', '#FFFF99']
        
        function createStars() {
            stars = []
            const count = Math.min(1200, Math.floor(width * height / 800)) // ekran boyutuna göre yoğunluk
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2.2 + 0.4, // küçük nokta nokta
                    color: colors[Math.floor(Math.random() * colors.length)],
                    phase: Math.random() * Math.PI * 2 // parıldama için
                })
            }
        }
        
        function resize() {
            width = window.innerWidth
            height = window.innerHeight
            canvas.width = width
            canvas.height = height
            cx = width / 2
            cy = height / 2
            createStars()
        }
        
        function draw() {
            // Hafif trail efekti için siyah overlay (uzay derinliği hissi)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)'
            ctx.fillRect(0, 0, width, height)
            
            ctx.save()
            ctx.translate(cx, cy)
            ctx.rotate(angle)
            
            const time = Date.now() / 280
            
            for (let i = 0; i < stars.length; i++) {
                const s = stars[i]
                
                // Parıldama efekti (uzayda gibi)
                const alpha = 0.7 + Math.sin(time + s.phase) * 0.3
                
                // Her yıldızın orijinal pozisyonunu merkeze göre döndür
                const dx = s.x - cx
                const dy = s.y - cy
                
                const rotatedX = dx * Math.cos(angle) - dy * Math.sin(angle)
                const rotatedY = dx * Math.sin(angle) + dy * Math.cos(angle)
                
                ctx.globalAlpha = alpha
                ctx.fillStyle = s.color
                
                // Küçük nokta (gerçekçi yıldız)
                ctx.beginPath()
                ctx.arc(rotatedX, rotatedY, s.r, 0, Math.PI * 2)
                ctx.fill()
                
                // Çok parlak yıldızlara ekstra parlak nokta
                if (s.r > 1.8) {
                    ctx.fillStyle = '#FFFFFF'
                    ctx.globalAlpha = alpha * 0.6
                    ctx.fillRect(rotatedX - 0.4, rotatedY - 0.4, 0.8, 0.8)
                }
            }
            
            ctx.restore()
            ctx.globalAlpha = 1
        }
        
        function animate() {
            draw()
            requestAnimationFrame(animate)
        }
        
        // Mouse + Touch sürükleme (parmakla uzayı döndürme)
        function startDrag(x, y) {
            isDragging = true
            prevX = x
            prevY = y
            canvas.style.cursor = 'grabbing'
        }
        
        function drag(x, y) {
            if (!isDragging) return
            const deltaX = x - prevX
            // Hassasiyet ayarı - daha doğal his için
            angle += deltaX * 0.0035
            prevX = x
            prevY = y
        }
        
        function endDrag() {
            isDragging = false
            canvas.style.cursor = 'grab'
        }
        
        // Event listener'lar
        function addListeners() {
            // Mouse
            canvas.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY))
            window.addEventListener('mousemove', e => drag(e.clientX, e.clientY))
            window.addEventListener('mouseup', endDrag)
            window.addEventListener('mouseleave', endDrag)
            
            // Touch (mobil parmak desteği)
            canvas.addEventListener('touchstart', e => {
                if (e.touches.length === 1) {
                    e.preventDefault()
                    startDrag(e.touches[0].clientX, e.touches[0].clientY)
                }
            })
            window.addEventListener('touchmove', e => {
                if (e.touches.length === 1 && isDragging) {
                    e.preventDefault()
                    drag(e.touches[0].clientX, e.touches[0].clientY)
                }
            })
            window.addEventListener('touchend', endDrag)
            
            // Klavye ile de döndürme (isteğe bağlı)
            let keyAngle = 0
            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft') keyAngle -= 0.02
                if (e.key === 'ArrowRight') keyAngle += 0.02
                angle += keyAngle
            })
        }
        
        // Başlat
        function init() {
            resize()
            addListeners()
            animate()
            
            // Pencere yeniden boyutlandığında
            window.addEventListener('resize', () => {
                resize()
            })
            
            // Başlangıçta hafif bir açı ver (daha dinamik his)
            angle = -0.3
            
            console.log('%c✅ Sertan Nalça uzay sitesi hazır! Arka planda yıldızları parmağınla (veya mouse ile) döndürerek uzayda olduğunu hissedebilirsin.', 'color:#77DDFF; font-family:monospace')
        }
        
        // Sayfa yüklendiğinde çalıştır
        window.onload = init
    </script>
</body>
</html>
