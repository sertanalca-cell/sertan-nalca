<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sertan Nalça</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #000; 
      font-family: 'Arial', sans-serif; 
    }
    canvas { display: block; }

    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-top: 12%;
      font-size: 2.8rem;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
      letter-spacing: -1px;
      pointer-events: none;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 1.35rem;
      color: #a0f0ff;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
      opacity: 1;
      transition: opacity 1.2s ease-in-out;
      pointer-events: none;
      min-height: 2rem;
    }

    .buttons {
      position: absolute;
      bottom: 14%;
      display: flex;
      gap: 18px;
      pointer-events: all;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 24px;
      font-size: 1rem;
      font-weight: 500;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.25);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    }

    .instagram {
      background: linear-gradient(90deg, #f56040, #c13584);
    }

    .whatsapp {
      background: linear-gradient(90deg, #25d366, #128c7e);
    }
  </style>
</head>
<body>

  <div class="overlay">
    <h1>Sertan Nalça</h1>
    <div class="subtitle" id="subtitle">AI Developer & Creator</div>

    <div class="buttons">
      <a href="https://www.instagram.com/sertanalca/" target="_blank" class="btn instagram">
        Instagram
      </a>
      <a href="https://wa.me/355692033673" target="_blank" class="btn whatsapp">
        WhatsApp
      </a>
    </div>
  </div>

  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    camera.position.z = 5.2;

    // Işıklar
    scene.add(new THREE.AmbientLight(0x404060, 1.1));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(6, 5, 10);
    scene.add(dirLight);

    // Dünya
    const earthRadius = 1.05;
    const earthGeo = new THREE.SphereGeometry(earthRadius, 64, 64);
    
    const earthMap = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    const earthNormal = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
    const earthSpecular = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');

    const earthMat = new THREE.MeshPhongMaterial({
      map: earthMap,
      bumpMap: earthNormal,
      bumpScale: 0.06,
      specularMap: earthSpecular,
      specular: 0x222222,
      shininess: 6
    });

    const earth = new THREE.Mesh(earthGeo, earthMat);
    scene.add(earth);

    // Atmosfer
    const atmGeo = new THREE.SphereGeometry(earthRadius * 1.07, 64, 64);
    const atmMat = new THREE.MeshPhongMaterial({
      color: 0x00ccff,
      transparent: true,
      opacity: 0.13,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide
    });
    earth.add(new THREE.Mesh(atmGeo, atmMat));

    // Ay — daha düzgün ve kaliteli
    const moonRadius = 0.29;
    const moonGeo = new THREE.SphereGeometry(moonRadius, 64, 64);
    const moonMat = new THREE.MeshPhongMaterial({
      map: new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/moon_1024.jpg'),
      bumpMap: new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/moon_1024.jpg'),
      bumpScale: 0.08,
      shininess: 2
    });
    const moon = new THREE.Mesh(moonGeo, moonMat);
    scene.add(moon);

    // Yıldızlar
    const starsCount = 10000;
    const starsGeo = new THREE.BufferGeometry();
    const posArray = new Float32Array(starsCount * 3);
    const colorArray = new Float32Array(starsCount * 3);

    for (let i = 0; i < starsCount * 3; i += 3) {
      posArray[i]     = (Math.random() - 0.5) * 240;
      posArray[i + 1] = (Math.random() - 0.5) * 240;
      posArray[i + 2] = (Math.random() - 0.5) * 200 - 60;
      
      const b = Math.random() * 0.6 + 0.4;
      colorArray[i] = b; 
      colorArray[i+1] = b; 
      colorArray[i+2] = b;
    }

    starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    starsGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

    const starsMat = new THREE.PointsMaterial({
      size: 0.13,
      vertexColors: true,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending
    });

    const starField = new THREE.Points(starsGeo, starsMat);
    scene.add(starField);

    // Metin döngüsü
    const subtitleEl = document.getElementById('subtitle');
    const texts = ["AI Developer & Creator", "I'm new coder", "I'm creating something amazing for all"];
    let index = 0;

    setTimeout(() => {
      setInterval(() => {
        subtitleEl.style.opacity = 0;
        setTimeout(() => {
          index = (index + 1) % texts.length;
          subtitleEl.textContent = texts[index];
          subtitleEl.style.opacity = 1;
        }, 800);
      }, 3200);
    }, 2800);

    // Mouse ile döndürme
    let isDragging = false;
    let prevX = 0, prevY = 0;
    let velX = 0, velY = 0;

    const canvas = renderer.domElement;
    canvas.addEventListener('mousedown', e => { 
      isDragging = true; 
      prevX = e.clientX; 
      prevY = e.clientY; 
    });
    canvas.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;
      earth.rotation.y += dx * 0.006;
      earth.rotation.x += dy * 0.006;
      velX = dx * 0.009;
      velY = dy * 0.009;
      prevX = e.clientX; 
      prevY = e.clientY;
    });
    window.addEventListener('mouseup', () => isDragging = false);

    // Animasyon
    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.012;

      earth.rotation.y += 0.0011 + velY * 0.88;
      earth.rotation.x += velX * 0.88;
      velX *= 0.88;
      velY *= 0.88;

      // Ay yavaş ve düzgün dönüyor
      const moonDist = 2.8;
      moon.position.x = Math.cos(time * 0.16) * moonDist;
      moon.position.z = Math.sin(time * 0.16) * moonDist;
      moon.rotation.y = time * 0.25;

      // Yıldız kayması
      starField.position.x += 0.009;
      starField.position.y -= 0.009;
      if (starField.position.x > 45) starField.position.x = -45;
      if (starField.position.y < -45) starField.position.y = 45;

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
