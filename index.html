<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sertan Nalça</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* CANVAS */
#scene {
  width: 100%;
  height: 60vh;
  display: block;
}

/* PROFILE */
.profile {
  text-align: center;
  margin-top: 10px;
}

.profile img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 2px solid white;
  object-fit: cover;
}

/* BIO */
.bio {
  text-align: center;
  margin: 20px;
  opacity: 0.8;
}

/* LINKS */
.links {
  text-align: center;
}

.links a {
  display: block;
  margin: 5px;
  color: #4da6ff;
  text-decoration: none;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<canvas id="scene"></canvas>

<div class="profile">
  <input type="file" accept="image/*" onchange="loadImage(event)">
  <br><br>
  <img id="output">
</div>

<div class="bio">
  <p>This is a short biography section. You can describe yourself here.</p>
</div>

<div class="links">
  <a href="#">Instagram 1</a>
  <a href="#">Instagram 2</a>
  <a href="#">Instagram 3</a>
  <a href="#">Instagram 4</a>
  <a href="#">Google Maps Location</a>
</div>

<div class="footer">Sertan Nalça</div>

<script>
// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight*0.6), 0.1, 1000);
camera.position.z = 5;

// RENDERER
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById("scene"), antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight * 0.6);

// LIGHT
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(5, 5, 5);
scene.add(light);

// EARTH
const earthGeometry = new THREE.SphereGeometry(1, 32, 32);
const earthTexture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/earth_atmos_2048.jpg');
const earthMaterial = new THREE.MeshStandardMaterial({ map: earthTexture });
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
scene.add(earth);

// MOON
const moonGeometry = new THREE.SphereGeometry(0.3, 32, 32);
const moonTexture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/moon_1024.jpg');
const moonMaterial = new THREE.MeshStandardMaterial({ map: moonTexture });
const moon = new THREE.Mesh(moonGeometry, moonMaterial);
scene.add(moon);

// STARS
const starsGeometry = new THREE.BufferGeometry();
const starVertices = [];

for (let i = 0; i < 1000; i++) {
  starVertices.push(
    (Math.random() - 0.5) * 1000,
    (Math.random() - 0.5) * 1000,
    (Math.random() - 0.5) * 1000
  );
}

starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff });
const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// ANIMATE
function animate() {
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;

  moon.rotation.y += 0.01;
  moon.position.x = Math.sin(Date.now() * 0.001) * 2;
  moon.position.z = Math.cos(Date.now() * 0.001) * 2;

  renderer.render(scene, camera);
}
animate();

// RESPONSIVE
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
  camera.aspect = window.innerWidth / (window.innerHeight * 0.6);
  camera.updateProjectionMatrix();
});

// IMAGE UPLOAD
function loadImage(event) {
  const img = document.getElementById('output');
  img.src = URL.createObjectURL(event.target.files[0]);
}
</script>

</body>
</html>
