<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertan Nalça • Digital Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #000000;
        }

        /* Karanlık uzay arka plan + hareketli yıldızlar */
        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: transparent;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 4s infinite alternate, moveStars 80s linear infinite;
            box-shadow: 0 0 6px white;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @keyframes moveStars {
            from { transform: translate(0, 0); }
            to { transform: translate(120px, 80px); } /* sol üstten sağ alta yavaş hareket */
        }

        .globe-container {
            width: 220px;
            height: 220px;
            position: relative;
            margin: 0 auto 40px;
            z-index: 2;
        }

        .globe {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #67e8f9 8%, #22c55e 38%, #15803d 65%, #052e16 85%);
            box-shadow: 
                0 0 90px rgba(103, 232, 249, 0.75),
                inset 40px 35px 60px rgba(255,255,255,0.35),
                inset -45px -45px 80px rgba(0,0,0,0.85);
            animation: rotateGlobe 42s linear infinite;
            border: 4px solid rgba(255,255,255,0.2);
        }

        @keyframes rotateGlobe {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .moon {
            position: absolute;
            width: 38px;
            height: 38px;
            background: #f1f5f9;
            border-radius: 50%;
            box-shadow: 0 0 22px #f1f5f9, inset 8px 8px 12px rgba(0,0,0,0.6);
            top: 18px;
            left: 175px;
            animation: moonOrbit 35s linear infinite;
            z-index: 3;
        }

        @keyframes moonOrbit {
            from { transform: rotate(0deg) translateX(105px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(105px) rotate(-360deg); }
        }

        .link-btn {
            transition: all 0.4s ease;
            font-size: 15.5px;
            padding: 13px 24px;
        }
        
        .link-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 35px rgba(168, 85, 247, 0.65);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-10 px-4 text-white relative">

    <!-- Hareketli Yıldızlar Katmanı -->
    <div class="stars" id="starsContainer"></div>

    <div class="max-w-md w-full text-center z-10">
        
        <!-- İsim (daha küçük) -->
        <h1 class="text-3xl font-bold tracking-tighter mb-2 text-white drop-shadow-2xl" 
            style="font-family: 'Playfair Display', serif;">
            Sertan Nalça
        </h1>
        <p class="text-purple-300 text-base mb-10">AI Developer & Creator</p>

        <!-- Gerçekçi Dönen Dünya + Ay -->
        <div class="globe-container">
            <div class="globe"></div>
            <div class="moon"></div>
        </div>

        <!-- Link Butonları -->
        <div class="space-y-3 px-6">
            <a href="https://instagram.com/sertanalca" target="_blank" 
               class="link-btn block bg-white/10 hover:bg-white/20 border border-white/30 font-medium rounded-3xl flex items-center justify-center gap-3 backdrop-blur-md">
                <i class="fab fa-instagram text-2xl"></i>
                <span>Instagram</span>
            </a>

                <i class="fab fa-whatsapp text-2xl"></i>
                <span>WhatsApp</span>
            </a>
